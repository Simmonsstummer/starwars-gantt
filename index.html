<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Wars — Complete Canon Timeline</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #06060f; }
    ::-webkit-scrollbar { height: 6px; width: 6px; background: #0e0e18; }
    ::-webkit-scrollbar-thumb { background: #303050; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Scale ────────────────────────────────────────────────────────────────
    const BREAK   = -30;
    const S_EARLY = 1.6;
    const S_MAIN  = 12;
    const YMIN    = -392;
    const YMAX    = 38;

    const makePx = zoom => y =>
      (y <= BREAK
        ? (y - YMIN) * S_EARLY
        : (BREAK - YMIN) * S_EARLY + (y - BREAK) * S_MAIN) * zoom;

    const makeInvPx = zoom => x => {
      const bx = (BREAK - YMIN) * S_EARLY * zoom;
      return x <= bx ? x / (S_EARLY * zoom) + YMIN : (x - bx) / (S_MAIN * zoom) + BREAK;
    };

    // ── Eras ─────────────────────────────────────────────────────────────────
    const ERAS = [
      { name: "HIGH REPUBLIC",    s: -392, e:  -33, bg: "#0d0d3a", color: "#7777ff" },
      { name: "FALL OF THE JEDI", s:  -33, e:  -19, bg: "#22103a", color: "#cc66ff" },
      { name: "IMPERIAL ERA",     s:  -19, e:    0, bg: "#380e0e", color: "#ff5555" },
      { name: "REBELLION",        s:    0, e:    5, bg: "#201e00", color: "#ddbb00" },
      { name: "NEW REPUBLIC",     s:    5, e:   34, bg: "#0d200d", color: "#55cc55" },
      { name: "FIRST ORDER",      s:   34, e:   38, bg: "#0d0d30", color: "#6677ff" },
    ];

    const TYPE_INFO = {
      f: { label: "Film",        color: "#f5c030" },
      a: { label: "Animated",    color: "#38b4f0" },
      l: { label: "Live-Action", color: "#f07248" },
      c: { label: "Comics",      color: "#6dc87a" },
      v: { label: "Novel",       color: "#c077d4" },
      g: { label: "Video Game",  color: "#e09830" },
    };

    const DATA = [
      { n: "The Phantom Menace",       t: "f", seg: [[-32, -31]] },
      { n: "Attack of the Clones",     t: "f", seg: [[-22, -21]] },
      { n: "Revenge of the Sith",      t: "f", seg: [[-19, -18.5]] },
      { n: "Solo: A Star Wars Story",  t: "f", seg: [[-13, -10]] },
      { n: "Rogue One",                t: "f", seg: [[-0.5, 0]] },
      { n: "A New Hope (Ep. IV)",      t: "f", seg: [[0, 0.5]] },
      { n: "The Empire Strikes Back",  t: "f", seg: [[3, 3.5]] },
      { n: "Return of the Jedi",       t: "f", seg: [[4, 4.5]] },
      { n: "The Force Awakens",        t: "f", seg: [[34, 34.5]] },
      { n: "The Last Jedi",            t: "f", seg: [[34.5, 35]] },
      { n: "The Rise of Skywalker",    t: "f", seg: [[35, 35.5]] },

      { n: "Young Jedi Adventures",    t: "a", seg: [[-132, -131]], lbl: ["132 BBY"] },
      { n: "Tales of the Underworld",  t: "a", seg: [[-52,-49],[-43,-40],[-33,-30],[-19,-16]], lbl: ["Bane I","Bane II","Bane III","Ventress"], note: "Cad Bane (3 arcs: ~52–33 BBY) + Asajj Ventress (19–16 BBY)" },
      { n: "Tales of the Jedi",        t: "a", seg: [[-48,-47],[-32,-31],[-22,-21],[-19,-18.5]], lbl: ["Dooku","Qui-Gon","Ahsoka CW","Ord.66"], note: "Anthology: Dooku and Ahsoka arcs across multiple eras" },
      { n: "The Clone Wars (film)",    t: "a", seg: [[-22, -21]] },
      { n: "The Clone Wars",           t: "a", seg: [[-22, -19]] },
      { n: "The Bad Batch",            t: "a", seg: [[-19, -17]] },
      { n: "Tales of the Empire",      t: "a", seg: [[-19,-10],[9,9.5]], lbl: ["Imp. Era","NR"], note: "Morgan Elsbeth (Imperial Era) + Barriss Offee → New Republic" },
      { n: "Maul: Shadow Lord",        t: "a", seg: [[-18, -17]] },
      { n: "Star Wars Rebels",         t: "a", seg: [[-5,-4],[-4,-3],[-2,-1.5],[-1,0],[4,4.5]], lbl: ["S1","S2","S3","S4","Ep."], note: "S2→S3 gap (1 year); epilogue 4 ABY" },
      { n: "Star Wars Resistance",     t: "a", seg: [[33.5, 35]] },

      { n: "The Acolyte",              t: "l", seg: [[-132, -131]], lbl: ["132 BBY"] },
      { n: "Obi-Wan Kenobi",           t: "l", seg: [[-9, -8]] },
      { n: "Andor",                    t: "l", seg: [[-5,-4.1],[-4,-3.1],[-3,-2.1],[-2,-1.1],[-1,-0.1]], lbl: ["S1","S2·I","S2·II","S2·III","S2·IV"], note: "S2: 4 chapters each jumping +1 year" },
      { n: "The Mandalorian",          t: "l", seg: [[9, 11]] },
      { n: "Book of Boba Fett",        t: "l", seg: [[4,4.5],[9,10]], lbl: ["flashback","present"], note: "Flashback 4 ABY; main story 9 ABY" },
      { n: "Ahsoka",                   t: "l", seg: [[9, 11]] },
      { n: "Skeleton Crew",            t: "l", seg: [[9, 10]] },

      { n: "High Republic (comics)",   t: "c", seg: [[-382,-350],[-232,-200],[-132,-100]], lbl: ["Phase II","Phase I","Phase III"], note: "Phase II=~382 BBY, Phase I=~232 BBY, Phase III=~132 BBY" },
      { n: "Shadow of Maul",           t: "c", seg: [[-19, -18]], note: "Prequel miniseries to Maul: Shadow Lord (2026)" },
      { n: "Darth Vader: Dark Lord",   t: "c", seg: [[-19, -14]], note: "Vader in the early years of the Empire (Soule 2017)" },
      { n: "Star Wars (Marvel 2015)",  t: "c", seg: [[0, 3]],     note: "Between A New Hope and Return of the Jedi" },
      { n: "Doctor Aphra",             t: "c", seg: [[0, 4]],     note: "Rogue archaeologist in the Rebellion era" },
      { n: "War BH / Crimson Reign",   t: "c", seg: [[3, 4]],     note: "Crossover event between ESB and ROTJ (3 ABY)" },

      { n: "High Republic (novels)",   t: "v", seg: [[-382,-350],[-232,-200],[-132,-100]], lbl: ["Phase II","Phase I","Phase III"], note: "Same three chronological phases as the HR comics" },
      { n: "Ahsoka (C. Gray 2016)",    t: "v", seg: [[-18, -17]], note: "Ahsoka after Order 66, building her new identity" },
      { n: "Thrawn (Z. Zahn)",         t: "v", seg: [[-11, -2]],  note: "Thrawn's origins; ties into Rebels" },
      { n: "Lost Stars (C. Gray)",     t: "v", seg: [[-11, 5]],   note: "From the protagonists' youth to the Battle of Jakku" },
      { n: "Aftermath (C. Wendig)",    t: "v", seg: [[4, 6]],     note: "Trilogy covering the Empire's collapse after ROTJ" },
      { n: "Alphabet Squadron",        t: "v", seg: [[4, 8]],     note: "X-wing squadron trilogy post-ROTJ" },

      { n: "Jedi: Fallen Order",       t: "g", seg: [[-14, -13]], note: "Cal Kestis, 5 years after Order 66 (14 BBY)" },
      { n: "Jedi: Survivor",           t: "g", seg: [[-9, -8]],   note: "5 years after Fallen Order, same year as Obi-Wan" },
      { n: "Star Wars Outlaws",        t: "g", seg: [[3, 3.5]],   note: "Kay Vess, between ESB and ROTJ (3 ABY)" },
      { n: "Battlefront II (story)",   t: "g", seg: [[4, 5]],     note: "Iden Versio, right after ROTJ (4–5 ABY)" },
    ];

    const GROUPS = [
      { t: "f", label: "FILMS",                    color: "#f5c030" },
      { t: "a", label: "ANIMATED SERIES",          color: "#38b4f0" },
      { t: "l", label: "LIVE-ACTION SERIES",       color: "#f07248" },
      { t: "c", label: "COMICS  (selection)",      color: "#6dc87a" },
      { t: "v", label: "NOVELS  (selection)",      color: "#c077d4" },
      { t: "g", label: "VIDEO GAMES  (selection)", color: "#e09830" },
    ];
    const TC = {
      f: { bar: "#f5c030", dim: "#b08820" },
      a: { bar: "#38b4f0", dim: "#2888b8" },
      l: { bar: "#f07248", dim: "#b05030" },
      c: { bar: "#6dc87a", dim: "#408850" },
      v: { bar: "#c077d4", dim: "#8040a0" },
      g: { bar: "#e09830", dim: "#a06820" },
    };

    const ROWS = GROUPS.flatMap(g => [
      { kind: "H", t: g.t, label: g.label, C: g.color },
      ...DATA.filter(d => d.t === g.t).map(d => ({ kind: "E", ...d })),
    ]);

    const LW = 222;
    const RH = 28;
    const AH = 58;
    const CH = AH + ROWS.length * RH;

    const TICKS = [
      { y: -382, lo: false }, { y: -232, lo: true  },
      { y: -132, lo: false }, { y:  -32, lo: true  },
      { y:  -22, lo: false }, { y:  -19, lo: true  },
      { y:   -9, lo: false }, { y:   -5, lo: true  },
      { y:    0, lo: false },
      { y:    4, lo: false }, { y:    9, lo: true  },
      { y:   34, lo: false }, { y:   35, lo: true  },
    ];

    const yl   = y => y < 0 ? `${-y} BBY` : y === 0 ? "0 (Yavin)" : `${y} ABY`;
    const sfmt = ([a, b]) => {
      const f = v => v < 0 ? `${Math.abs(v)} BBY` : `${v} ABY`;
      return `${f(a)} → ${f(b)}`;
    };
    const getEra    = seg => {
      const mid = (seg[0][0] + seg[seg.length - 1][1]) / 2;
      return ERAS.find(e => mid >= e.s && mid < e.e) || ERAS[0];
    };
    const activeAt  = year => DATA.filter(d => d.seg.some(([a, b]) => year >= a && year <= b));

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [hov,        setHov]        = useState(null);
      const [pinned,     setPinned]     = useState(null);
      const [zoom,       setZoom]       = useState(1);
      const [scrubX,     setScrubX]     = useState(null); // px in SVG
      const [scrubYear,  setScrubYear]  = useState(null);
      const [scrubLocked,setScrubLocked]= useState(false);
      const [lockedX,    setLockedX]    = useState(null);
      const [lockedYear, setLockedYear] = useState(null);

      const chartRef = useRef(null);
      const svgRef   = useRef(null);

      const px    = makePx(zoom);
      const invPx = makeInvPx(zoom);
      const CW    = Math.ceil(px(YMAX));

      // wheel → zoom (no Ctrl needed)
      useEffect(() => {
        const el = chartRef.current;
        if (!el) return;
        const handler = e => {
          e.preventDefault();
          setZoom(z => Math.min(6, Math.max(0.3, +(z - e.deltaY * 0.002).toFixed(3))));
        };
        el.addEventListener("wheel", handler, { passive: false });
        return () => el.removeEventListener("wheel", handler);
      }, []);

      // Scrubber mouse tracking on SVG
      const onSvgMouseMove = e => {
        const rect = svgRef.current.getBoundingClientRect();
        const x    = e.clientX - rect.left;
        if (!scrubLocked) {
          setScrubX(x);
          setScrubYear(invPx(x));
        }
      };
      const onSvgMouseLeave = () => {
        if (!scrubLocked) { setScrubX(null); setScrubYear(null); }
      };
      const onSvgClick = e => {
        // only lock if clicking on empty space (not a row bar)
        if (e.target.tagName === "svg" || e.target.tagName === "rect" && e.target.getAttribute("data-bg")) {
          const rect = svgRef.current.getBoundingClientRect();
          const x    = e.clientX - rect.left;
          const y    = invPx(x);
          if (scrubLocked && Math.abs(x - lockedX) < 6) {
            // click on the locked line → unlock
            setScrubLocked(false); setLockedX(null); setLockedYear(null);
          } else {
            setScrubLocked(true); setLockedX(x); setLockedYear(y);
            setScrubX(x); setScrubYear(y);
          }
        }
      };

      const displayYear  = scrubLocked ? lockedYear  : scrubYear;
      const displayScrubX= scrubLocked ? lockedX     : scrubX;

      // Side panel content
      const rowDetail = pinned ? DATA.find(d => d.n === pinned) : hov ? DATA.find(d => d.n === hov) : null;
      const panelMode = rowDetail ? "row" : (displayYear != null ? "scrub" : null);
      const panelEra  = rowDetail ? getEra(rowDetail.seg) : null;
      const scrubActive = panelMode === "scrub" ? activeAt(displayYear) : [];

      const togglePin = name => setPinned(p => p === name ? null : name);

      const yearLabel = y => {
        if (y == null) return "";
        const r = Math.round(y * 10) / 10;
        return r < 0 ? `${Math.abs(r).toFixed(1)} BBY` : r === 0 ? "0 (Yavin)" : `${r.toFixed(1)} ABY`;
      };

      return (
        <div style={{
          minHeight: "100vh", background: "#06060f",
          fontFamily: "'DM Mono','Fira Mono','Courier New',monospace",
          color: "#d0c8c0", userSelect: "none",
        }}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');`}</style>

          {/* ── Header ── */}
          <div style={{ padding: "20px 24px 10px", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap", borderBottom: "1px solid #1a1a30" }}>
            <div>
              <div style={{ fontSize: 9, letterSpacing: ".32em", color: "#f5c030", marginBottom: 7, fontWeight: 500 }}>
                A LONG TIME AGO IN A GALAXY FAR, FAR AWAY…
              </div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 300, letterSpacing: ".07em", color: "#ffffff" }}>
                Star Wars — Complete Canon Timeline
              </h1>
              <p style={{ margin: "6px 0 0", fontSize: 11, color: "#8888aa", lineHeight: 1.7 }}>
                Films · Animated · Live-action · Comics · Novels · Video games
                &nbsp;·&nbsp; compressed scale before 30 BBY
                &nbsp;·&nbsp; split bars = time jump within a series
              </p>
            </div>

            {/* Zoom controls */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0, paddingTop: 6 }}>
              <span style={{ fontSize: 9, color: "#5050780", letterSpacing: ".14em", color: "#7070a0" }}>ZOOM</span>
              {[["−", z => Math.max(0.3, +(z-0.25).toFixed(2))], ["reset", () => 1], ["+", z => Math.min(6, +(z+0.25).toFixed(2))]].map(([l, fn]) => (
                <button key={l} onClick={() => setZoom(fn)}
                  style={{ background: "#111128", border: "1px solid #303050", color: "#a0a0cc", fontSize: 12, padding: "4px 12px", cursor: "pointer", borderRadius: 4, fontFamily: "inherit" }}
                  onMouseEnter={e => e.currentTarget.style.background="#1e1e3c"}
                  onMouseLeave={e => e.currentTarget.style.background="#111128"}
                >{l}</button>
              ))}
              <span style={{ fontSize: 11, color: "#8888bb", minWidth: 42 }}>{Math.round(zoom * 100)}%</span>
              <span style={{ fontSize: 9, color: "#40405a" }}>scroll to zoom</span>
            </div>
          </div>

          {/* ── Legend ── */}
          <div style={{ display: "flex", gap: 18, padding: "10px 24px 10px", flexWrap: "wrap", alignItems: "center", borderBottom: "1px solid #12121e" }}>
            {GROUPS.map(g => (
              <span key={g.t} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 10.5, color: "#c0c0c0" }}>
                <span style={{ width: 16, height: 6, background: g.color, display: "inline-block", borderRadius: 2 }} />
                {g.label.split("(")[0].trim()}
              </span>
            ))}
            <span style={{ fontSize: 9, color: "#40405a", marginLeft: "auto" }}>
              ╌╌ time gap &nbsp;│&nbsp; ⚡ ×{(S_MAIN/S_EARLY).toFixed(0)}× scale after 30 BBY
              &nbsp;│&nbsp; <span style={{ color: "#f5c03070" }}>click chart</span> to lock scrubber · <span style={{ color: "#9090c070" }}>click row</span> to pin
            </span>
          </div>

          {/* ── Chart + Panel ── */}
          <div style={{ display: "flex" }}>

            {/* Scrollable chart area */}
            <div ref={chartRef} style={{ flex: 1, minWidth: 0, display: "flex", overflowX: "auto" }}>

              {/* Sticky label column */}
              <div style={{
                width: LW, flexShrink: 0,
                position: "sticky", left: 0, zIndex: 10,
                background: "#06060f", borderRight: "1px solid #1e1e38",
              }}>
                <div style={{
                  height: AH, background: "#0c0c1e",
                  borderBottom: "1px solid #1e1e38",
                  display: "flex", alignItems: "flex-end",
                  paddingBottom: 8, paddingLeft: 12,
                }}>
                  <span style={{ fontSize: 8, color: "#505070", letterSpacing: ".2em" }}>TITLE</span>
                </div>

                {ROWS.map((row, i) => (
                  <div key={i}
                    onClick={() => row.kind === "E" && togglePin(row.n)}
                    style={{
                      height: RH,
                      display: "flex", alignItems: "center",
                      paddingLeft: row.kind === "H" ? 8 : 14, paddingRight: 6,
                      background:
                        row.kind === "H"   ? "#0e0e22"
                        : pinned === row.n ? "#181838"
                        : hov    === row.n ? "#131330"
                        : "transparent",
                      borderBottom: "1px solid #10101e",
                      borderLeft: pinned === row.n
                        ? "3px solid " + (TC[row.t]?.bar ?? "#fff")
                        : "3px solid transparent",
                      color:
                        row.kind === "H"                               ? row.C
                        : (pinned === row.n || hov === row.n)         ? "#ffffff"
                        : "#c8c8c8",
                      fontSize: row.kind === "H" ? 8 : 11,
                      fontWeight: row.kind === "H" ? 500 : 300,
                      letterSpacing: row.kind === "H" ? ".16em" : ".02em",
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                      transition: "color .1s, background .1s",
                      cursor: row.kind === "E" ? "pointer" : "default",
                    }}
                  >{row.kind === "H" ? row.label : row.n}</div>
                ))}
              </div>

              {/* SVG */}
              <svg ref={svgRef} width={CW} height={CH}
                style={{ display: "block", flexShrink: 0, cursor: "crosshair" }}
                onMouseMove={onSvgMouseMove}
                onMouseLeave={onSvgMouseLeave}
                onClick={onSvgClick}
              >
                {/* Era backgrounds */}
                {ERAS.map((e, i) => (
                  <rect key={i} data-bg="1" x={px(e.s)} y={0} width={px(e.e)-px(e.s)} height={CH} fill={e.bg} />
                ))}

                {/* Era borders */}
                {ERAS.slice(1).map((e, i) => (
                  <line key={i} x1={px(e.s)} y1={0} x2={px(e.s)} y2={CH} stroke="#303060" strokeWidth={1} />
                ))}

                {/* Scale-break zigzag */}
                {(() => {
                  const bx = px(BREAK), pts = [];
                  for (let y = 0; y < CH; y += 5)
                    pts.push(`${bx + (y % 10 < 5 ? 2.5 : -2.5)},${y}`);
                  return <polyline points={pts.join(" ")} stroke="#383878" strokeWidth={2} fill="none" />;
                })()}

                {/* Era name labels */}
                {ERAS.map((e, i) => (
                  <text key={i}
                    x={(px(e.s)+px(e.e))/2} y={16}
                    textAnchor="middle" fill={e.color} fillOpacity={0.65}
                    fontSize={8.5} fontFamily="DM Mono,monospace" letterSpacing=".13em"
                  >{e.name}</text>
                ))}

                {/* Compressed scale label */}
                <text x={px(BREAK)-5} y={AH/2+4}
                  textAnchor="end" fill="#4040808" fontSize={6} fontFamily="DM Mono,monospace"
                  fill="#505090"
                  transform={`rotate(-90,${px(BREAK)-5},${AH/2+4})`}
                >COMPRESSED SCALE ⚡</text>

                {/* Axis */}
                <line x1={0} y1={AH-1} x2={CW} y2={AH-1} stroke="#303050" />

                {/* Ticks + year labels + vertical grid */}
                {TICKS.map(({ y, lo }) => {
                  const x  = px(y);
                  const ty = lo ? AH - 11 : AH - 24;
                  return (
                    <g key={y}>
                      <line x1={x} y1={AH-9} x2={x} y2={AH} stroke="#6060a0" strokeWidth={1.5} />
                      <text x={x} y={ty} textAnchor="middle"
                        fill={y === 0 ? "#f0d030" : "#9898d0"}
                        fontSize={y === 0 ? 9 : 8}
                        fontWeight={y === 0 ? "500" : "300"}
                        fontFamily="DM Mono,monospace"
                      >{yl(y)}</text>
                      <line x1={x} y1={AH} x2={x} y2={CH}
                        stroke={y === 0 ? "#585820" : "#1e1e38"}
                        strokeWidth={y === 0 ? 1.5 : 1} />
                    </g>
                  );
                })}

                {/* Yavin dashed gold line */}
                <line x1={px(0)} y1={AH} x2={px(0)} y2={CH}
                  stroke="#f5c03060" strokeWidth={1.5} strokeDasharray="2,7" />

                {/* Rows */}
                {ROWS.map((row, i) => {
                  const ry     = AH + i * RH;
                  if (row.kind === "H")
                    return <rect key={i} data-bg="1" x={0} y={ry} width={CW} height={RH} fill="#0e0e24" />;

                  const c        = TC[row.t];
                  const isActive = (pinned ?? hov) === row.n;
                  const isScrubActive = displayYear != null && row.seg.some(([a,b]) => displayYear >= a && displayYear <= b);

                  return (
                    <g key={i}
                      onMouseEnter={() => setHov(row.n)}
                      onMouseLeave={() => setHov(null)}
                      onClick={e => { e.stopPropagation(); togglePin(row.n); }}
                      style={{ cursor: "pointer" }}
                    >
                      <rect data-bg="1" x={0} y={ry} width={CW} height={RH}
                        fill={isActive ? "#161640" : isScrubActive ? "#121228" : (i%2===0 ? "#0c0c1c" : "#06060f")} />

                      {/* Connectors */}
                      {row.seg.slice(1).map((s, si) => (
                        <line key={si}
                          x1={px(row.seg[si][1])} y1={ry+RH/2}
                          x2={px(s[0])}           y2={ry+RH/2}
                          stroke={c.dim} strokeWidth={1.5} strokeDasharray="3,4" />
                      ))}

                      {/* Bars */}
                      {row.seg.map((s, si) => {
                        const bx  = px(s[0]);
                        const bw  = Math.max(5, px(s[1])-px(s[0]));
                        const bh  = RH - 10;
                        const by  = ry + 5;
                        const lbl = row.lbl?.[si];
                        return (
                          <g key={si}>
                            <rect x={bx+1} y={by+2} width={bw} height={bh} rx={3} fill="#000" opacity={.4} />
                            <rect x={bx} y={by} width={bw} height={bh} rx={3}
                              fill={c.bar}
                              opacity={isActive ? 0.98 : isScrubActive ? 0.95 : 0.85} />
                            <rect x={bx} y={by} width={bw} height={Math.min(5, bh*.3)} rx={3}
                              fill="rgba(255,255,255,.28)" style={{ pointerEvents:"none" }} />
                            {lbl && bw > 24 && (
                              <text x={bx+bw/2} y={by+bh/2+3.5}
                                textAnchor="middle" fill="rgba(0,0,0,.85)"
                                fontSize={6.5} fontFamily="DM Mono,monospace" fontWeight="500"
                                style={{ pointerEvents:"none" }}
                              >{lbl}</text>
                            )}
                          </g>
                        );
                      })}
                    </g>
                  );
                })}

                <line x1={0} y1={CH-1} x2={CW} y2={CH-1} stroke="#1e1e38" />

                {/* ── Scrubber line ── */}
                {displayScrubX != null && (
                  <g style={{ pointerEvents: "none" }}>
                    {/* Glow */}
                    <line x1={displayScrubX} y1={0} x2={displayScrubX} y2={CH}
                      stroke={scrubLocked ? "#f5c030" : "#ffffff"}
                      strokeWidth={scrubLocked ? 8 : 6}
                      strokeOpacity={0.06} />
                    {/* Main line */}
                    <line x1={displayScrubX} y1={0} x2={displayScrubX} y2={CH}
                      stroke={scrubLocked ? "#f5c030" : "#aaaadd"}
                      strokeWidth={scrubLocked ? 1.5 : 1}
                      strokeDasharray={scrubLocked ? "none" : "4,3"}
                      strokeOpacity={scrubLocked ? 0.9 : 0.7} />
                    {/* Year label bubble */}
                    {(() => {
                      const lbl  = yearLabel(displayYear);
                      const tw   = lbl.length * 6.2 + 14;
                      const lx   = Math.min(displayScrubX - tw/2, CW - tw - 4);
                      const lxC  = Math.max(lx, 2);
                      return (
                        <g>
                          <rect x={lxC} y={AH-26} width={tw} height={18} rx={4}
                            fill={scrubLocked ? "#302000" : "#101020"}
                            stroke={scrubLocked ? "#f5c030" : "#6060a0"}
                            strokeWidth={1} opacity={0.95} />
                          <text x={lxC + tw/2} y={AH-13}
                            textAnchor="middle"
                            fill={scrubLocked ? "#f5d050" : "#c0c0f0"}
                            fontSize={8.5} fontFamily="DM Mono,monospace" fontWeight="400"
                          >{lbl}</text>
                        </g>
                      );
                    })()}
                    {/* Lock icon dot */}
                    {scrubLocked && (
                      <circle cx={displayScrubX} cy={AH + 6} r={4}
                        fill="#f5c030" opacity={0.9} />
                    )}
                  </g>
                )}
              </svg>
            </div>

            {/* ── Side panel ── */}
            <div style={{
              width: panelMode ? 290 : 0,
              minWidth: panelMode ? 290 : 0,
              overflow: "hidden",
              transition: "width .2s ease, min-width .2s ease",
              background: "#0a0a1c",
              borderLeft: panelMode ? "1px solid #202040" : "none",
              flexShrink: 0,
              position: "sticky", top: 0,
              alignSelf: "flex-start",
              maxHeight: "100vh", overflowY: "auto",
            }}>

              {/* ROW detail mode */}
              {panelMode === "row" && rowDetail && (() => {
                const d = rowDetail;
                const era = panelEra;
                return (
                  <div style={{ padding: "20px 18px", minWidth: 290 }}>
                    <div style={{
                      display: "inline-flex", alignItems: "center", gap: 7,
                      background: TYPE_INFO[d.t].color + "18",
                      border: "1px solid " + TYPE_INFO[d.t].color + "55",
                      color: TYPE_INFO[d.t].color,
                      fontSize: 8, letterSpacing: ".18em", fontWeight: 500,
                      padding: "3px 10px", borderRadius: 3, marginBottom: 14,
                    }}>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: TYPE_INFO[d.t].color }} />
                      {TYPE_INFO[d.t].label.toUpperCase()}
                    </div>

                    <div style={{ fontSize: 16, fontWeight: 400, color: "#ffffff", lineHeight: 1.4, marginBottom: 16 }}>
                      {d.n}
                    </div>

                    {era && (
                      <div style={{ marginBottom: 14 }}>
                        <div style={{ fontSize: 7.5, color: "#505070", letterSpacing: ".14em", marginBottom: 5 }}>ERA</div>
                        <span style={{
                          fontSize: 9.5, color: era.color, letterSpacing: ".1em",
                          background: era.color + "15", border: "1px solid " + era.color + "35",
                          padding: "2px 9px", borderRadius: 3,
                        }}>{era.name}</span>
                      </div>
                    )}

                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 7.5, color: "#505070", letterSpacing: ".14em", marginBottom: 8 }}>TIMELINE</div>
                      {d.seg.map((s, i) => (
                        <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start" }}>
                          <div style={{ width: 3, height: 18, borderRadius: 2, flexShrink: 0, marginTop: 1, background: TYPE_INFO[d.t].color, opacity: .8 }} />
                          <div>
                            <div style={{ fontSize: 12, color: "#d0d0f0" }}>{sfmt(s)}</div>
                            {d.lbl?.[i] && <div style={{ fontSize: 9.5, color: "#707090", marginTop: 2 }}>{d.lbl[i]}</div>}
                          </div>
                        </div>
                      ))}
                      {d.seg.length > 1 && (
                        <div style={{ fontSize: 9, color: "#505068", fontStyle: "italic", marginTop: 2 }}>
                          {d.seg.length} segments with time gaps
                        </div>
                      )}
                    </div>

                    {d.note && (
                      <div style={{ borderTop: "1px solid #1c1c38", paddingTop: 14 }}>
                        <div style={{ fontSize: 7.5, color: "#505070", letterSpacing: ".14em", marginBottom: 8 }}>NOTES</div>
                        <div style={{ fontSize: 11, color: "#a0a0c8", lineHeight: 1.7, fontStyle: "italic" }}>{d.note}</div>
                      </div>
                    )}

                    {pinned && (
                      <button onClick={() => setPinned(null)} style={{
                        marginTop: 20, width: "100%",
                        background: "#111122", border: "1px solid #2a2a44",
                        color: "#7070a0", fontSize: 9, padding: "7px",
                        cursor: "pointer", borderRadius: 4, fontFamily: "inherit", letterSpacing: ".12em",
                      }}
                        onMouseEnter={e => e.currentTarget.style.background="#1a1a30"}
                        onMouseLeave={e => e.currentTarget.style.background="#111122"}
                      >CLOSE ✕</button>
                    )}
                  </div>
                );
              })()}

              {/* SCRUBBER mode */}
              {panelMode === "scrub" && (
                <div style={{ padding: "20px 18px", minWidth: 290 }}>
                  <div style={{ fontSize: 7.5, color: "#505070", letterSpacing: ".16em", marginBottom: 6 }}>
                    {scrubLocked ? "📍 LOCKED AT" : "SCRUBBER"}
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 400, color: scrubLocked ? "#f5d050" : "#c0c0f0", marginBottom: 16, letterSpacing: ".05em" }}>
                    {yearLabel(displayYear)}
                  </div>

                  {scrubActive.length === 0 ? (
                    <div style={{ fontSize: 10, color: "#404060", fontStyle: "italic" }}>No media at this point</div>
                  ) : (
                    <>
                      <div style={{ fontSize: 7.5, color: "#505070", letterSpacing: ".14em", marginBottom: 10 }}>
                        ACTIVE NOW · {scrubActive.length} title{scrubActive.length !== 1 ? "s" : ""}
                      </div>
                      {scrubActive.map(d => (
                        <div key={d.n}
                          onClick={() => { setPinned(d.n); }}
                          style={{
                            display: "flex", alignItems: "center", gap: 10,
                            padding: "7px 10px", marginBottom: 4, borderRadius: 4,
                            background: "#101022", border: "1px solid #1e1e38",
                            cursor: "pointer", transition: "background .1s",
                          }}
                          onMouseEnter={e => e.currentTarget.style.background="#181832"}
                          onMouseLeave={e => e.currentTarget.style.background="#101022"}
                        >
                          <span style={{ width: 8, height: 8, borderRadius: 2, flexShrink: 0, background: TYPE_INFO[d.t].color }} />
                          <div>
                            <div style={{ fontSize: 10.5, color: "#e0e0f0" }}>{d.n}</div>
                            <div style={{ fontSize: 8.5, color: TYPE_INFO[d.t].color, opacity: .7, marginTop: 1 }}>
                              {TYPE_INFO[d.t].label}
                            </div>
                          </div>
                        </div>
                      ))}
                      <div style={{ fontSize: 8.5, color: "#404060", marginTop: 10, fontStyle: "italic" }}>
                        click a title to pin its details
                      </div>
                    </>
                  )}

                  {scrubLocked && (
                    <button onClick={() => { setScrubLocked(false); setLockedX(null); setLockedYear(null); }} style={{
                      marginTop: 16, width: "100%",
                      background: "#111122", border: "1px solid #2a2a44",
                      color: "#7070a0", fontSize: 9, padding: "7px",
                      cursor: "pointer", borderRadius: 4, fontFamily: "inherit", letterSpacing: ".12em",
                    }}
                      onMouseEnter={e => e.currentTarget.style.background="#1a1a30"}
                      onMouseLeave={e => e.currentTarget.style.background="#111122"}
                    >UNLOCK ✕</button>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* ── Footnote ── */}
          <div style={{ padding: "10px 24px 24px", fontSize: 9, color: "#404060", lineHeight: 1.8, borderTop: "1px solid #12121e" }}>
            High Republic: 3 phases — Phase II (~382 BBY), Phase I (~232 BBY), Phase III (~132 BBY, ties into <i>The Acolyte</i>). &nbsp;
            Comics: selection of main canonical Marvel series. Novels: most notable canon titles. &nbsp;
            Video games: only titles with an officially canonical single-player campaign. &nbsp;
            <i>Maul: Shadow Lord</i> (2026) confirmed between <i>The Bad Batch</i> and <i>Solo</i> (~18 BBY).
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
