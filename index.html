<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Wars — Complete Canon Timeline</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090910; }
    ::-webkit-scrollbar { height: 6px; width: 6px; background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const BREAK   = -30;
    const S_EARLY = 1.6;
    const S_MAIN  = 12;
    const YMIN    = -392;
    const YMAX    = 38;

    const basePx = y =>
      y <= BREAK
        ? (y - YMIN) * S_EARLY
        : (BREAK - YMIN) * S_EARLY + (y - BREAK) * S_MAIN;

    const ERAS = [
      { name: "HIGH REPUBLIC",    s: -392, e:  -33, bg: "#0d0d38", color: "#6666dd" },
      { name: "FALL OF THE JEDI", s:  -33, e:  -19, bg: "#200e38", color: "#aa55dd" },
      { name: "IMPERIAL ERA",     s:  -19, e:    0, bg: "#320c0c", color: "#dd4444" },
      { name: "REBELLION",        s:    0, e:    5, bg: "#1c1a00", color: "#ccaa00" },
      { name: "NEW REPUBLIC",     s:    5, e:   34, bg: "#0c1c0c", color: "#44bb44" },
      { name: "FIRST ORDER",      s:   34, e:   38, bg: "#0a0a2c", color: "#5555cc" },
    ];

    const TYPE_INFO = {
      f: { label: "Film",         color: "#f5c030" },
      a: { label: "Animated",     color: "#38b4f0" },
      l: { label: "Live-Action",  color: "#f07248" },
      c: { label: "Comics",       color: "#6dc87a" },
      v: { label: "Novel",        color: "#c077d4" },
      g: { label: "Video Game",   color: "#e09830" },
    };

    const DATA = [
      { n: "The Phantom Menace",       t: "f", seg: [[-32, -31]] },
      { n: "Attack of the Clones",     t: "f", seg: [[-22, -21]] },
      { n: "Revenge of the Sith",      t: "f", seg: [[-19, -18.5]] },
      { n: "Solo: A Star Wars Story",  t: "f", seg: [[-13, -10]] },
      { n: "Rogue One",                t: "f", seg: [[-0.5, 0]] },
      { n: "A New Hope (Ep. IV)",      t: "f", seg: [[0, 0.5]] },
      { n: "The Empire Strikes Back",  t: "f", seg: [[3, 3.5]] },
      { n: "Return of the Jedi",       t: "f", seg: [[4, 4.5]] },
      { n: "The Force Awakens",        t: "f", seg: [[34, 34.5]] },
      { n: "The Last Jedi",            t: "f", seg: [[34.5, 35]] },
      { n: "The Rise of Skywalker",    t: "f", seg: [[35, 35.5]] },

      { n: "Young Jedi Adventures",    t: "a", seg: [[-132, -131]], lbl: ["132 BBY"] },
      { n: "Tales of the Underworld",  t: "a", seg: [[-52, -49], [-43, -40], [-33, -30], [-19, -16]], lbl: ["Bane I", "Bane II", "Bane III", "Ventress"], note: "Cad Bane (3 arcs: ~52–33 BBY) + Asajj Ventress (19–16 BBY)" },
      { n: "Tales of the Jedi",        t: "a", seg: [[-48, -47], [-32, -31], [-22, -21], [-19, -18.5]], lbl: ["Dooku", "Qui-Gon", "Ahsoka CW", "Ord.66"], note: "Anthology: Dooku and Ahsoka arcs across multiple eras" },
      { n: "The Clone Wars (film)",    t: "a", seg: [[-22, -21]] },
      { n: "The Clone Wars",           t: "a", seg: [[-22, -19]] },
      { n: "The Bad Batch",            t: "a", seg: [[-19, -17]] },
      { n: "Tales of the Empire",      t: "a", seg: [[-19, -10], [9, 9.5]], lbl: ["Imp. Era", "NR"], note: "Morgan Elsbeth (Imperial Era) + Barriss Offee → New Republic" },
      { n: "Maul: Shadow Lord",        t: "a", seg: [[-18, -17]] },
      { n: "Star Wars Rebels",         t: "a", seg: [[-5, -4], [-4, -3], [-2, -1.5], [-1, 0], [4, 4.5]], lbl: ["S1", "S2", "S3", "S4", "Ep."], note: "S2→S3 gap (1 year); epilogue 4 ABY" },
      { n: "Star Wars Resistance",     t: "a", seg: [[33.5, 35]] },

      { n: "The Acolyte",              t: "l", seg: [[-132, -131]], lbl: ["132 BBY"] },
      { n: "Obi-Wan Kenobi",           t: "l", seg: [[-9, -8]] },
      { n: "Andor",                    t: "l", seg: [[-5, -4.1], [-4, -3.1], [-3, -2.1], [-2, -1.1], [-1, -0.1]], lbl: ["S1", "S2·I", "S2·II", "S2·III", "S2·IV"], note: "S2: 4 chapters each jumping +1 year" },
      { n: "The Mandalorian",          t: "l", seg: [[9, 11]] },
      { n: "Book of Boba Fett",        t: "l", seg: [[4, 4.5], [9, 10]], lbl: ["flashback", "present"], note: "Flashback 4 ABY; main story 9 ABY" },
      { n: "Ahsoka",                   t: "l", seg: [[9, 11]] },
      { n: "Skeleton Crew",            t: "l", seg: [[9, 10]] },

      { n: "High Republic (comics)",   t: "c", seg: [[-382, -350], [-232, -200], [-132, -100]], lbl: ["Phase II", "Phase I", "Phase III"], note: "Phase II=~382 BBY, Phase I=~232 BBY, Phase III=~132 BBY" },
      { n: "Shadow of Maul",           t: "c", seg: [[-19, -18]], note: "Prequel miniseries to Maul: Shadow Lord (2026)" },
      { n: "Darth Vader: Dark Lord",   t: "c", seg: [[-19, -14]], note: "Vader in the early years of the Empire (Soule 2017)" },
      { n: "Star Wars (Marvel 2015)",  t: "c", seg: [[0, 3]],     note: "Between A New Hope and Return of the Jedi" },
      { n: "Doctor Aphra",             t: "c", seg: [[0, 4]],     note: "Rogue archaeologist in the Rebellion era" },
      { n: "War BH / Crimson Reign",   t: "c", seg: [[3, 4]],     note: "Crossover event between ESB and ROTJ (3 ABY)" },

      { n: "High Republic (novels)",   t: "v", seg: [[-382, -350], [-232, -200], [-132, -100]], lbl: ["Phase II", "Phase I", "Phase III"], note: "Same three chronological phases as the HR comics" },
      { n: "Ahsoka (C. Gray 2016)",    t: "v", seg: [[-18, -17]], note: "Ahsoka after Order 66, building her new identity" },
      { n: "Thrawn (Z. Zahn)",         t: "v", seg: [[-11, -2]],  note: "Thrawn's origins; ties into Rebels" },
      { n: "Lost Stars (C. Gray)",     t: "v", seg: [[-11, 5]],   note: "From the protagonists' youth to the Battle of Jakku" },
      { n: "Aftermath (C. Wendig)",    t: "v", seg: [[4, 6]],     note: "Trilogy covering the Empire's collapse after ROTJ" },
      { n: "Alphabet Squadron",        t: "v", seg: [[4, 8]],     note: "X-wing squadron trilogy post-ROTJ" },

      { n: "Jedi: Fallen Order",       t: "g", seg: [[-14, -13]], note: "Cal Kestis, 5 years after Order 66 (14 BBY)" },
      { n: "Jedi: Survivor",           t: "g", seg: [[-9, -8]],   note: "5 years after Fallen Order, same year as Obi-Wan" },
      { n: "Star Wars Outlaws",        t: "g", seg: [[3, 3.5]],   note: "Kay Vess, between ESB and ROTJ (3 ABY)" },
      { n: "Battlefront II (story)",   t: "g", seg: [[4, 5]],     note: "Iden Versio, right after ROTJ (4–5 ABY)" },
    ];

    const GROUPS = [
      { t: "f", label: "FILMS",                    color: "#f5c030" },
      { t: "a", label: "ANIMATED SERIES",          color: "#38b4f0" },
      { t: "l", label: "LIVE-ACTION SERIES",       color: "#f07248" },
      { t: "c", label: "COMICS  (selection)",      color: "#6dc87a" },
      { t: "v", label: "NOVELS  (selection)",      color: "#c077d4" },
      { t: "g", label: "VIDEO GAMES  (selection)", color: "#e09830" },
    ];
    const TC = {
      f: { bar: "#f5c030", dim: "#a07828" },
      a: { bar: "#38b4f0", dim: "#2878a8" },
      l: { bar: "#f07248", dim: "#a85030" },
      c: { bar: "#6dc87a", dim: "#3a8048" },
      v: { bar: "#c077d4", dim: "#7a3898" },
      g: { bar: "#e09830", dim: "#906020" },
    };

    const ROWS = GROUPS.flatMap(g => [
      { kind: "H", t: g.t, label: g.label, C: g.color },
      ...DATA.filter(d => d.t === g.t).map(d => ({ kind: "E", ...d })),
    ]);

    const LW = 222;
    const RH = 27;
    const AH = 54;
    const CH = AH + ROWS.length * RH;

    const TICKS = [
      { y: -382, lo: false }, { y: -232, lo: true  },
      { y: -132, lo: false }, { y:  -32, lo: true  },
      { y:  -22, lo: false }, { y:  -19, lo: true  },
      { y:   -9, lo: false }, { y:   -5, lo: true  },
      { y:    0, lo: false },
      { y:    4, lo: false }, { y:    9, lo: true  },
      { y:   34, lo: false }, { y:   35, lo: true  },
    ];

    const yl    = y => y < 0 ? `${-y} BBY` : y === 0 ? "0 (Yavin)" : `${y} ABY`;
    const sfmt  = ([a, b]) => {
      const f = v => v < 0 ? `${Math.abs(v)} BBY` : `${v} ABY`;
      return `${f(a)} → ${f(b)}`;
    };
    const getEra = seg => {
      const mid = (seg[0][0] + seg[seg.length - 1][1]) / 2;
      return ERAS.find(e => mid >= e.s && mid < e.e) || ERAS[0];
    };

    // ─── Zoom button ──────────────────────────────────────────────────────────
    function ZBtn({ children, onClick }) {
      const [ov, setOv] = useState(false);
      return (
        <button onClick={onClick}
          onMouseEnter={() => setOv(true)} onMouseLeave={() => setOv(false)}
          style={{
            background: ov ? "#1e1e38" : "#13131f",
            border: "1px solid #2a2a44", color: "#9090c0",
            fontSize: 11, padding: "3px 11px", cursor: "pointer",
            borderRadius: 3, fontFamily: "inherit", transition: "background .12s",
          }}
        >{children}</button>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [hov,    setHov]    = useState(null);
      const [pinned, setPinned] = useState(null);
      const [zoom,   setZoom]   = useState(1);
      const chartRef = useRef(null);

      const active = pinned ?? hov;
      const hd     = active ? DATA.find(d => d.n === active) : null;
      const era    = hd ? getEra(hd.seg) : null;

      // px() is zoom-aware
      const px = y =>
        (y <= BREAK
          ? (y - YMIN) * S_EARLY
          : (BREAK - YMIN) * S_EARLY + (y - BREAK) * S_MAIN) * zoom;
      const CW = Math.ceil(px(YMAX));

      // Ctrl + wheel → zoom
      useEffect(() => {
        const el = chartRef.current;
        if (!el) return;
        const handler = e => {
          if (!e.ctrlKey) return;
          e.preventDefault();
          setZoom(z => Math.min(6, Math.max(0.3, z - e.deltaY * 0.0012)));
        };
        el.addEventListener("wheel", handler, { passive: false });
        return () => el.removeEventListener("wheel", handler);
      }, []);

      const togglePin = name => setPinned(p => p === name ? null : name);

      return (
        <div style={{
          minHeight: "100vh", background: "#090910",
          fontFamily: "'DM Mono','Fira Mono','Courier New',monospace",
          color: "#c0b8b8", userSelect: "none",
        }}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');`}</style>

          {/* ── Header ── */}
          <div style={{ padding: "20px 24px 10px", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 8, letterSpacing: ".3em", color: "#f5c030", marginBottom: 6, fontWeight: 500 }}>
                A LONG TIME AGO IN A GALAXY FAR, FAR AWAY…
              </div>
              <h1 style={{ margin: 0, fontSize: 20, fontWeight: 300, letterSpacing: ".07em", color: "#ede5dc" }}>
                Star Wars — Complete Canon Timeline
              </h1>
              <p style={{ margin: "5px 0 0", fontSize: 10, color: "#686868", lineHeight: 1.6 }}>
                Films · Animated · Live-action · Comics · Novels · Video games
                &nbsp;·&nbsp; compressed scale before 30 BBY &nbsp;·&nbsp; split bars = time jump
              </p>
            </div>

            {/* Zoom controls */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0, paddingTop: 4 }}>
              <span style={{ fontSize: 9, color: "#505070", letterSpacing: ".12em" }}>ZOOM</span>
              <ZBtn onClick={() => setZoom(z => Math.max(0.3, +(z - 0.25).toFixed(2)))}>−</ZBtn>
              <ZBtn onClick={() => setZoom(1)}>reset</ZBtn>
              <ZBtn onClick={() => setZoom(z => Math.min(6, +(z + 0.25).toFixed(2)))}>+</ZBtn>
              <span style={{ fontSize: 10, color: "#7070a0", minWidth: 38 }}>{Math.round(zoom * 100)}%</span>
              <span style={{ fontSize: 8.5, color: "#303050" }}>· Ctrl+scroll</span>
            </div>
          </div>

          {/* ── Legend ── */}
          <div style={{ display: "flex", gap: 16, padding: "0 24px 12px", flexWrap: "wrap", alignItems: "center" }}>
            {GROUPS.map(g => (
              <span key={g.t} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: "#a0a0a0" }}>
                <span style={{ width: 14, height: 5, background: g.color, display: "inline-block", borderRadius: 2 }} />
                {g.label.split("(")[0].trim()}
              </span>
            ))}
            <span style={{ fontSize: 9, color: "#404060", marginLeft: "auto" }}>
              ╌╌ time jump &nbsp;│&nbsp; ⚡ ×{(S_MAIN / S_EARLY).toFixed(0)}× scale after 30 BBY &nbsp;│&nbsp; click a row to pin details
            </span>
          </div>

          {/* ── Chart area + side panel ── */}
          <div style={{ display: "flex" }}>

            {/* Scrollable chart */}
            <div ref={chartRef} style={{ flex: 1, minWidth: 0, display: "flex", overflowX: "auto" }}>

              {/* Sticky labels */}
              <div style={{
                width: LW, flexShrink: 0,
                position: "sticky", left: 0, zIndex: 10,
                background: "#090910", borderRight: "1px solid #1e1e34",
              }}>
                <div style={{
                  height: AH, background: "#0d0d1e",
                  borderBottom: "1px solid #1e1e34",
                  display: "flex", alignItems: "flex-end",
                  paddingBottom: 7, paddingLeft: 10,
                }}>
                  <span style={{ fontSize: 7, color: "#404060", letterSpacing: ".18em" }}>TITLE</span>
                </div>

                {ROWS.map((row, i) => (
                  <div key={i}
                    onClick={() => row.kind === "E" && togglePin(row.n)}
                    style={{
                      height: RH,
                      display: "flex", alignItems: "center",
                      paddingLeft: row.kind === "H" ? 8 : 14, paddingRight: 6,
                      background:
                        row.kind === "H"       ? "#0e0e20"
                        : pinned === row.n     ? "#16162e"
                        : hov    === row.n     ? "#121228"
                        : "transparent",
                      borderBottom: "1px solid #111122",
                      borderLeft: pinned === row.n
                        ? "2px solid " + (TC[row.t]?.bar ?? "#fff")
                        : "2px solid transparent",
                      color:
                        row.kind === "H"                                ? row.C
                        : (pinned === row.n || hov === row.n)          ? "#ffffff"
                        : "#b0b0b0",
                      fontSize:      row.kind === "H" ? 7.5 : 10.5,
                      fontWeight:    row.kind === "H" ? 500 : 300,
                      letterSpacing: row.kind === "H" ? ".16em" : ".02em",
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                      transition: "color .1s, background .1s",
                      cursor: row.kind === "E" ? "pointer" : "default",
                    }}
                  >
                    {row.kind === "H" ? row.label : row.n}
                  </div>
                ))}
              </div>

              {/* SVG timeline */}
              <svg width={CW} height={CH} style={{ display: "block", flexShrink: 0 }}>

                {/* Era backgrounds */}
                {ERAS.map((e, i) => (
                  <rect key={i} x={px(e.s)} y={0} width={px(e.e) - px(e.s)} height={CH} fill={e.bg} />
                ))}
                {/* Era borders */}
                {ERAS.slice(1).map((e, i) => (
                  <line key={i} x1={px(e.s)} y1={0} x2={px(e.s)} y2={CH} stroke="#2a2a50" strokeWidth={1} />
                ))}

                {/* Scale-break zigzag */}
                {(() => {
                  const bx = px(BREAK), pts = [];
                  for (let y = 0; y < CH; y += 5)
                    pts.push(`${bx + (y % 10 < 5 ? 2.5 : -2.5)},${y}`);
                  return <polyline points={pts.join(" ")} stroke="#3030608" strokeWidth={2} fill="none" />;
                })()}

                {/* Era name labels */}
                {ERAS.map((e, i) => (
                  <text key={i}
                    x={(px(e.s) + px(e.e)) / 2} y={15}
                    textAnchor="middle" fill={e.color} fillOpacity={0.45}
                    fontSize={8} fontFamily="DM Mono,monospace" letterSpacing=".13em"
                  >{e.name}</text>
                ))}

                {/* Scale-break label */}
                <text x={px(BREAK) - 5} y={AH / 2 + 4}
                  textAnchor="end" fill="#30306a" fontSize={6}
                  fontFamily="DM Mono,monospace"
                  transform={`rotate(-90,${px(BREAK) - 5},${AH / 2 + 4})`}
                >COMPRESSED SCALE ⚡</text>

                {/* Axis */}
                <line x1={0} y1={AH - 1} x2={CW} y2={AH - 1} stroke="#282848" />

                {/* Ticks + grid */}
                {TICKS.map(({ y, lo }) => {
                  const x  = px(y);
                  const ty = lo ? AH - 10 : AH - 22;
                  return (
                    <g key={y}>
                      <line x1={x} y1={AH - 8} x2={x} y2={AH} stroke="#505080" />
                      <text x={x} y={ty} textAnchor="middle"
                        fill={y === 0 ? "#d0b020" : "#7878b0"}
                        fontSize={8} fontFamily="DM Mono,monospace"
                      >{yl(y)}</text>
                      <line x1={x} y1={AH} x2={x} y2={CH}
                        stroke={y === 0 ? "#484820" : "#1c1c38"}
                        strokeWidth={y === 0 ? 1.5 : 1} />
                    </g>
                  );
                })}

                {/* Yavin dashed line */}
                <line x1={px(0)} y1={AH} x2={px(0)} y2={CH}
                  stroke="#f5c03050" strokeWidth={1.5} strokeDasharray="2,7" />

                {/* Rows */}
                {ROWS.map((row, i) => {
                  const ry = AH + i * RH;
                  if (row.kind === "H")
                    return <rect key={i} x={0} y={ry} width={CW} height={RH} fill="#0e0e22" />;

                  const c      = TC[row.t];
                  const isActive = active === row.n;

                  return (
                    <g key={i}
                      onMouseEnter={() => setHov(row.n)}
                      onMouseLeave={() => setHov(null)}
                      onClick={() => togglePin(row.n)}
                      style={{ cursor: "pointer" }}
                    >
                      <rect x={0} y={ry} width={CW} height={RH}
                        fill={isActive ? "#141434" : (i % 2 === 0 ? "#0c0c1a" : "#090910")} />

                      {/* Connectors */}
                      {row.seg.slice(1).map((s, si) => (
                        <line key={si}
                          x1={px(row.seg[si][1])} y1={ry + RH / 2}
                          x2={px(s[0])}           y2={ry + RH / 2}
                          stroke={c.dim} strokeWidth={1.5} strokeDasharray="3,4" />
                      ))}

                      {/* Bars */}
                      {row.seg.map((s, si) => {
                        const bx  = px(s[0]);
                        const bw  = Math.max(5, px(s[1]) - px(s[0]));
                        const bh  = RH - 9;
                        const by  = ry + 4;
                        const lbl = row.lbl?.[si];
                        return (
                          <g key={si}>
                            <rect x={bx + 1} y={by + 2} width={bw} height={bh} rx={3} fill="#000" opacity={.35} />
                            <rect x={bx} y={by} width={bw} height={bh} rx={3}
                              fill={c.bar} opacity={isActive ? 0.96 : 0.82} />
                            <rect x={bx} y={by} width={bw} height={Math.min(4, bh * .28)} rx={3}
                              fill="rgba(255,255,255,.25)" style={{ pointerEvents: "none" }} />
                            {lbl && bw > 22 && (
                              <text x={bx + bw / 2} y={by + bh / 2 + 3.5}
                                textAnchor="middle" fill="rgba(0,0,0,.8)"
                                fontSize={6.5} fontFamily="DM Mono,monospace" fontWeight="500"
                                style={{ pointerEvents: "none" }}
                              >{lbl}</text>
                            )}
                          </g>
                        );
                      })}
                    </g>
                  );
                })}

                <line x1={0} y1={CH - 1} x2={CW} y2={CH - 1} stroke="#1e1e34" />
              </svg>
            </div>

            {/* ── Side panel ── */}
            <div style={{
              width: hd ? 280 : 0,
              minWidth: hd ? 280 : 0,
              overflow: "hidden",
              transition: "width .22s ease, min-width .22s ease",
              background: "#0c0c1e",
              borderLeft: hd ? "1px solid #1e1e38" : "none",
              flexShrink: 0,
              position: "sticky",
              top: 0,
              alignSelf: "flex-start",
              maxHeight: "100vh",
              overflowY: "auto",
            }}>
              {hd && (
                <div style={{ padding: "20px 16px", minWidth: 280 }}>

                  {/* Type badge */}
                  <div style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    background: TYPE_INFO[hd.t].color + "18",
                    border: "1px solid " + TYPE_INFO[hd.t].color + "50",
                    color: TYPE_INFO[hd.t].color,
                    fontSize: 8, letterSpacing: ".18em", fontWeight: 500,
                    padding: "3px 10px", borderRadius: 3, marginBottom: 12,
                  }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", background: TYPE_INFO[hd.t].color, display: "inline-block" }} />
                    {TYPE_INFO[hd.t].label.toUpperCase()}
                  </div>

                  {/* Title */}
                  <div style={{ fontSize: 15, fontWeight: 400, color: "#eee5dc", lineHeight: 1.4, marginBottom: 16 }}>
                    {hd.n}
                  </div>

                  {/* Era */}
                  {era && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 7, color: "#404068", letterSpacing: ".14em", marginBottom: 4 }}>ERA</div>
                      <div style={{
                        display: "inline-block",
                        fontSize: 9.5, color: era.color, letterSpacing: ".1em",
                        background: era.color + "14", border: "1px solid " + era.color + "30",
                        padding: "2px 8px", borderRadius: 3,
                      }}>{era.name}</div>
                    </div>
                  )}

                  {/* Timeline segments */}
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 7, color: "#404068", letterSpacing: ".14em", marginBottom: 8 }}>TIMELINE</div>
                    {hd.seg.map((s, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 7 }}>
                        <div style={{
                          width: 3, height: 16, borderRadius: 2, flexShrink: 0, marginTop: 1,
                          background: TYPE_INFO[hd.t].color, opacity: 0.7,
                        }} />
                        <div>
                          <div style={{ fontSize: 11, color: "#b0b0d0", letterSpacing: ".03em" }}>{sfmt(s)}</div>
                          {hd.lbl?.[i] && (
                            <div style={{ fontSize: 9, color: "#606080", marginTop: 2 }}>{hd.lbl[i]}</div>
                          )}
                        </div>
                      </div>
                    ))}
                    {hd.seg.length > 1 && (
                      <div style={{ fontSize: 8.5, color: "#404060", fontStyle: "italic", marginTop: 4 }}>
                        {hd.seg.length} separate segments with time gaps
                      </div>
                    )}
                  </div>

                  {/* Notes */}
                  {hd.note && (
                    <div style={{
                      borderTop: "1px solid #1c1c34", paddingTop: 14, marginBottom: 4,
                    }}>
                      <div style={{ fontSize: 7, color: "#404068", letterSpacing: ".14em", marginBottom: 8 }}>NOTES</div>
                      <div style={{ fontSize: 10.5, color: "#9090b8", lineHeight: 1.65, fontStyle: "italic" }}>
                        {hd.note}
                      </div>
                    </div>
                  )}

                  {/* Close button (only when pinned) */}
                  {pinned && (
                    <button onClick={() => setPinned(null)} style={{
                      marginTop: 20, width: "100%",
                      background: "#111120", border: "1px solid #282840",
                      color: "#606080", fontSize: 8.5, padding: "6px",
                      cursor: "pointer", borderRadius: 3, fontFamily: "inherit",
                      letterSpacing: ".12em", transition: "background .12s",
                    }}
                      onMouseEnter={e => e.currentTarget.style.background = "#1a1a30"}
                      onMouseLeave={e => e.currentTarget.style.background = "#111120"}
                    >
                      CLOSE ✕
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* ── Footnote ── */}
          <div style={{ padding: "8px 24px 24px", fontSize: 9, color: "#30304a", lineHeight: 1.7 }}>
            High Republic: 3 phases — Phase II (~382 BBY), Phase I (~232 BBY), Phase III (~132 BBY, ties into <i>The Acolyte</i>).&nbsp;
            Comics: selection of main canonical Marvel series. Novels: most notable canon titles.&nbsp;
            Video games: only titles with an officially canonical single-player campaign.&nbsp;
            <i>Maul: Shadow Lord</i> (2026) confirmed between <i>The Bad Batch</i> and <i>Solo</i> (~18 BBY).
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
