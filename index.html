    const BREAK   = -30;
    const S_ULTRA = 0.1;
    const S_EARLY = 1.6;
    const S_MAIN  = 12;

    const B2X = (BREAK2 - YMIN) * S_ULTRA;
    const BX  = B2X + (BREAK - BREAK2) * S_EARLY;

    const basePx    = y => y <= BREAK2 ? (y-YMIN)*S_ULTRA : y <= BREAK ? B2X+(y-BREAK2)*S_EARLY : BX+(y-BREAK)*S_MAIN;

      // ─ SOFT CANON ───────────────────────────────────────────────────────────

      { n: "KOTOR II: The Sith Lords", t:"s", seg:[[-3952,-3944]],

      { n: "Republic Commando",       t:"s", seg:[[-22,-19]],
        release:"Mar 2005",
        desc:"Elite clone commando squad Delta Squad fights through the Clone Wars on key battlefronts with tactics and brotherhood where ordinary soldiers would fail. (Legends; Delta Squad and Scorch appeared in canon.)",
        note:"Delta Squad (RC-1138 Boss & team) appeared in Clone Wars S3 'Witches of the Mist'; Scorch re-appeared in The Bad Batch S1 (2021)",

      { n: "The Force Unleashed I+II",t:"s", seg:[[-3,-0.5]],
        release:"2008 / 2010",
        desc:"Darth Vader's secret apprentice is trained from birth as the ultimate Jedi hunter — until a spark of rebellion begins to stir inside him. (Legends; elements referenced in Rebels and Andor.)",
        note:"Starkiller armor Easter egg in Andor S1; Imperial Flametroopers (first in TFU) now canonical in The Mandalorian; thematic DNA absorbed into Rebels' Ezra/Kanan arc",
        links:[{l:"Wookieepedia",u:"https://starwars.fandom.com/wiki/Star_Wars:_The_Force_Unleashed"},{l:"Wikipedia",u:"https://en.wikipedia.org/wiki/Star_Wars:_The_Force_Unleashed"}] },
      { n: "Shadows of the Empire",   t:"s", seg:[[3,3.5]],
        release:"1996",
        desc:"Set between The Empire Strikes Back and Return of the Jedi: a ruthless crime lord moves to fill the power vacuum in the criminal underworld while the galaxy teeters on the edge of war. (Legends; Black Sun canonized in Clone Wars/Rebels.)",
        note:"Black Sun crime syndicate fully canonical in Clone Wars S5 and Rebels; fills the ESB→ROTJ gap; Falleen species canonized in Clone Wars",
        links:[{l:"Wookieepedia",u:"https://starwars.fandom.com/wiki/Star_Wars:_Shadows_of_the_Empire"},{l:"Wikipedia",u:"https://en.wikipedia.org/wiki/Shadows_of_the_Empire"}] },
    ];

    // ── Groups & colors ──────────────────────────────────────────────────────
    const GROUPS = [
      { t:"f", label:"FILMS",                             color:"#f5c030" },
      { t:"a", label:"ANIMATED SERIES",                  color:"#38b4f0" },
      { t:"l", label:"LIVE-ACTION SERIES",               color:"#f07248" },
      { t:"c", label:"COMICS  (selection)",              color:"#6dc87a" },
      { t:"v", label:"NOVELS  (selection)",              color:"#c077d4" },
      { t:"g", label:"VIDEO GAMES  (selection)",         color:"#e09830" },
      { t:"s", label:"SOFT CANON  (Legends ref. in canon)", color:"#c8a060" },
    ];
    const TC = {
      f:{bar:"#f5c030",dim:"#b08820"}, a:{bar:"#38b4f0",dim:"#2888b8"},
      l:{bar:"#f07248",dim:"#b05030"}, c:{bar:"#6dc87a",dim:"#408850"},
      v:{bar:"#c077d4",dim:"#8040a0"}, g:{bar:"#e09830",dim:"#a06820"},
      s:{bar:"#c8a060",dim:"#806030"},
    };

    const LW=222, RH=28, AH=58;

    const TICKS = [
      {y:-3956,lo:false},{y:-3640,lo:true},
      {y:-382,lo:false},{y:-232,lo:true},
      {y:-132,lo:false},{y:-32,lo:true},
      {y:-22,lo:false},{y:-19,lo:true},
      {y:-9,lo:false},{y:-5,lo:true},
      {y:0,lo:false},
      {y:4,lo:false},{y:9,lo:true},
      {y:34,lo:false},{y:35,lo:true},
    ];

    const yl     = y => y<0?`${-y} BBY`:y===0?"0 (Yavin)":`${y} ABY`;
    const sfmt   = ([a,b]) => { const f=v=>v<0?`${Math.abs(v)} BBY`:`${v} ABY`; return `${f(a)} → ${f(b)}`; };
    const getEra = seg => { const m=(seg[0][0]+seg[seg.length-1][1])/2; return ERAS.find(e=>m>=e.s&&m<e.e)||ERAS[0]; };
    const activeAt = year => DATA.filter(d => d.seg.some(([a,b])=>year>=a&&year<=b));
    const yearLbl  = y => { if(y==null)return""; const r=Math.round(y*10)/10; return r<0?`${Math.abs(r).toFixed(1)} BBY`:r===0?"0 (Yavin)":`${r.toFixed(1)} ABY`; };

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [hov,setHov]                 = useState(null);
      const [pinned,setPinned]           = useState(null);
      const [zoom,setZoom]               = useState(1);
      const [scrubX,setScrubX]           = useState(null);
      const [scrubYear,setScrubYear]     = useState(null);
      const [scrubLocked,setScrubLocked] = useState(false);
      const [lockedYear,setLockedYear]   = useState(null);
      const [isDragging,setIsDragging]   = useState(false);
      const [collapsed,setCollapsed]     = useState(new Set());
      const [exporting,setExporting]     = useState(false);
      const [showLinks,setShowLinks]     = useState(false);
      const [userdata,setUserdata]       = useState(() => { try { return JSON.parse(localStorage.getItem('sw-userdata')||'{}'); } catch(e){ return {}; } });
      const [theme,setTheme]             = useState(() => localStorage.getItem('sw-theme')||'dark');
      const dragStart = useRef(null);
      const dragMoved = useRef(false);
      const chartRef  = useRef(null);
      const svgRef    = useRef(null);

      const isDark = theme === 'dark';

      const T = {
        bg:          isDark ? '#06060f' : '#f5f5fa',
        bgSurface:   isDark ? '#0c0c1e' : '#eaeaf5',
        bgRowH:      isDark ? '#0e0e22' : '#e2e2f0',
        bgRowEven:   isDark ? '#0c0c1c' : '#f2f2f8',
        bgRowBase:   isDark ? '#06060f' : '#f8f8fc',
        bgPanel:     isDark ? '#0a0a1c' : '#ffffff',
        bgBtn:       isDark ? '#111128' : '#dcdcef',
        bgBtnHov:    isDark ? '#1e1e3c' : '#c8c8e2',
        text:        isDark ? '#d0c8c0' : '#16162a',
        textDim:     isDark ? '#8888aa' : '#3a3a5c',
        textFaint:   isDark ? '#505070' : '#5a5a80',
        border:      isDark ? '#1e1e38' : '#a8a8cc',
        borderFaint: isDark ? '#12121e' : '#c8c8e0',
        borderPanel: isDark ? '#202040' : '#a0a0c8',
      };

      useEffect(() => { localStorage.setItem('sw-theme', theme); }, [theme]);
      useEffect(() => { document.body.style.background = T.bg; }, [theme]);
      useEffect(() => { try { localStorage.setItem('sw-userdata', JSON.stringify(userdata)); } catch(e){} }, [userdata]);

      const setDone   = (name, val) => setUserdata(u => ({...u, [name]: {...(u[name]||{}), done: val}}));
      const setRating = (name, val) => setUserdata(u => ({...u, [name]: {...(u[name]||{}), rating: val}}));

      const watchedCount = DATA.filter(d => userdata[d.n]?.done).length;

      const toggleCollapse = t => setCollapsed(s=>{ const n=new Set(s); n.has(t)?n.delete(t):n.add(t); return n; });

      const exportPNG = () => {
        if(exporting) return;
        setExporting(true);
        const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        const totalW = LW + CW, dpr = 2;
        let lbl = `
          <rect x="0" y="0" width="${LW}" height="${CH}" fill="${T.bg}"/>
          <rect x="0" y="0" width="${LW}" height="${AH}" fill="${T.bgSurface}"/>
          <line x1="0" y1="${AH-1}" x2="${LW}" y2="${AH-1}" stroke="${T.border}" stroke-width="1"/>
          <text x="12" y="${AH-10}" fill="${T.textFaint}" font-size="8" font-family="'Courier New',monospace" letter-spacing="3">TITLE</text>
          <line x1="${LW-1}" y1="0" x2="${LW-1}" y2="${CH}" stroke="${T.border}" stroke-width="1"/>`;
        ROWS.forEach((row,i)=>{
          const ry=AH+i*RH, bg=row.kind==="H"?T.bgRowH:i%2===0?T.bgRowEven:T.bgRowBase;
          const color=row.kind==="H"?row.C:row.t==="s"?"#c8a060":"#c8c8c8";
          const fw=row.kind==="H"?"700":"300", fs=row.kind==="H"?"9.5":"11";
          const tx=row.kind==="H"?16:20, text=esc(row.kind==="H"?row.label:row.n);
          lbl+=`<rect x="0" y="${ry}" width="${LW}" height="${RH}" fill="${bg}"/>`;
          lbl+=`<line x1="0" y1="${ry+RH}" x2="${LW}" y2="${ry+RH}" stroke="${T.borderFaint}" stroke-width="1"/>`;
          lbl+=`<text x="${tx}" y="${ry+RH/2+4}" fill="${color}" font-size="${fs}" font-weight="${fw}" font-family="'Courier New',monospace">${text}</text>`;
        });
        const full=`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${CH}">
          <rect width="${totalW}" height="${CH}" fill="${T.bg}"/>
          ${lbl}
          <g transform="translate(${LW},0)">${svgRef.current.innerHTML}</g>
        </svg>`;
        const url=URL.createObjectURL(new Blob([full],{type:"image/svg+xml;charset=utf-8"}));
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement("canvas");
          c.width=totalW*dpr; c.height=CH*dpr;
          const ctx=c.getContext("2d"); ctx.scale(dpr,dpr);
          ctx.drawImage(img,0,0);
          URL.revokeObjectURL(url);
          c.toBlob(b=>{
            const a=document.createElement("a");
            a.href=URL.createObjectURL(b); a.download="starwars-timeline.png"; a.click();
            setExporting(false);
          },"image/png");
        };
        img.onerror=()=>{ URL.revokeObjectURL(url); setExporting(false); };
        img.src=url;
      };

      const ROWS = GROUPS.flatMap(g => [
        { kind:"H", t:g.t, label:g.label, C:g.color },
        ...(collapsed.has(g.t) ? [] : DATA.filter(d=>d.t===g.t).map(d=>({ kind:"E", ...d }))),
      ]);
      const CH = AH+ROWS.length*RH;

      const px    = makePx(zoom);
      const invPx = makeInvPx(zoom);
      const CW    = Math.ceil(px(YMAX));

      const displayScrubX = scrubLocked ? px(lockedYear) : scrubX;
      const displayYear   = scrubLocked ? lockedYear : scrubYear;

      useEffect(() => {
        const el = chartRef.current; if(!el) return;
        const h = e => { if(!e.ctrlKey) return; e.preventDefault(); setZoom(z=>Math.min(6,Math.max(0.3,+(z-e.deltaY*0.002).toFixed(3)))); };
        el.addEventListener("wheel",h,{passive:false});
        return ()=>el.removeEventListener("wheel",h);
      },[]);

      useEffect(()=>{ const up=()=>setIsDragging(false); window.addEventListener("mouseup",up); return()=>window.removeEventListener("mouseup",up); },[]);

      const onChartMouseDown = e => {
        if(e.button!==0)return;
        dragMoved.current=false; setIsDragging(true);
        dragStart.current={clientX:e.clientX,scrollLeft:chartRef.current.scrollLeft};
      };
      const onChartMouseMove = e => {
        if(isDragging&&dragStart.current){
          const dx=e.clientX-dragStart.current.clientX;
          if(Math.abs(dx)>3)dragMoved.current=true;
          chartRef.current.scrollLeft=dragStart.current.scrollLeft-dx;
        }
      };
      const onSvgMouseMove = e => {
        if(isDragging)return;
        const r=svgRef.current.getBoundingClientRect(), x=e.clientX-r.left;
        if(!scrubLocked){setScrubX(x);setScrubYear(invPx(x));}
      };
      const onSvgMouseLeave = ()=>{ if(!scrubLocked){setScrubX(null);setScrubYear(null);} };
      const onSvgClick = e => {
        if(dragMoved.current)return;
        const r=svgRef.current.getBoundingClientRect(), x=e.clientX-r.left, y=invPx(x);
        if(scrubLocked&&Math.abs(x-px(lockedYear))<8){setScrubLocked(false);setLockedYear(null);}
        else{setScrubLocked(true);setLockedYear(y);setScrubX(x);setScrubYear(y);}
      };
      const togglePin = name => setPinned(p=>p===name?null:name);

      const rowDetail  = pinned?DATA.find(d=>d.n===pinned):null;
      const panelMode  = rowDetail?"row":scrubLocked?"scrub":null;
      const panelEra   = rowDetail?getEra(rowDetail.seg):null;
      const scrubItems = panelMode==="scrub"?activeAt(lockedYear):[];

      // Build connection lines
      const connectionLines = [];
      if(showLinks){
        DATA.forEach(d => {
          if(!d.connects) return;
          const si = ROWS.findIndex(r => r.kind==="E" && r.n===d.n);
          if(si===-1) return;
          d.connects.forEach(name => {
            const target = DATA.find(dd=>dd.n===name);
            if(!target) return;
            const di = ROWS.findIndex(r => r.kind==="E" && r.n===name);
            if(di===-1) return;
            const x1 = px(d.seg[d.seg.length-1][1]);
            const y1 = AH + si*RH + RH/2;
            const x2 = px(target.seg[0][0]);
            const y2 = AH + di*RH + RH/2;
            // Route arc to the RIGHT of both endpoints so it's always visible
            const bulge = Math.max(x1, x2) + Math.max(40, Math.abs(y2-y1)*0.25);
            connectionLines.push({x1,y1,x2,y2,bulge,key:`${d.n}->${name}`});
          });
        });
      }

      const btnStyle = (active) => ({
        background: active ? T.bgBtnHov : T.bgBtn,
        border: `1px solid ${active ? '#f5c03066' : T.border}`,
        color: active ? '#f5c030' : T.textDim,
        fontSize:11, padding:"4px 12px", cursor:"pointer", borderRadius:4,
        fontFamily:"inherit"
      });

      return (
        <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'DM Mono','Fira Mono','Courier New',monospace",color:T.text,userSelect:"none"}}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap'); a{transition:color .15s;}`}</style>

          {/* ── Header ── */}
          <div style={{padding:"20px 24px 10px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap",borderBottom:`1px solid ${T.border}`}}>
            <div>
              <div style={{fontSize:9,letterSpacing:".32em",color:"#f5c030",marginBottom:7,fontWeight:500}}>A LONG TIME AGO IN A GALAXY FAR, FAR AWAY…</div>
              <h1 style={{margin:0,fontSize:22,fontWeight:300,letterSpacing:".07em",color:isDark?"#ffffff":"#0a0a1e"}}>Star Wars — Complete Canon Timeline</h1>
              <p style={{margin:"6px 0 0",fontSize:11,color:T.textDim,lineHeight:1.7}}>
                drag to pan &nbsp;·&nbsp; Ctrl+scroll to zoom &nbsp;·&nbsp; click chart to lock scrubber &nbsp;·&nbsp; click row to pin details &nbsp;·&nbsp; click category header to collapse
              </p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,paddingTop:6,flexWrap:"wrap"}}>
              {/* Watched counter */}
              <span style={{fontSize:9.5,color:T.textDim,letterSpacing:".05em",marginRight:4}}>{watchedCount} / {DATA.length} watched</span>
              <div style={{width:1,height:20,background:T.border,margin:"0 2px"}}/>
              {/* Theme toggle */}
              <button onClick={()=>setTheme(isDark?'light':'dark')}
                style={{...btnStyle(false),fontSize:14,padding:"3px 10px"}}
                onMouseEnter={e=>e.currentTarget.style.background=T.bgBtnHov}
                onMouseLeave={e=>e.currentTarget.style.background=T.bgBtn}
                title={isDark?"Switch to light mode":"Switch to dark mode"}
              >{isDark?"☀":"☾"}</button>
              <div style={{width:1,height:20,background:T.border,margin:"0 2px"}}/>
              {/* Connections toggle */}
              <button onClick={()=>setShowLinks(s=>!s)}
                style={btnStyle(showLinks)}
                onMouseEnter={e=>{ e.currentTarget.style.background=T.bgBtnHov; }}
                onMouseLeave={e=>{ e.currentTarget.style.background=showLinks?T.bgBtnHov:T.bgBtn; }}
              >{showLinks?"links on":"links off"}</button>
              <div style={{width:1,height:20,background:T.border,margin:"0 2px"}}/>
              <span style={{fontSize:9,letterSpacing:".14em",color:T.textFaint}}>ZOOM</span>
              {[["−",z=>Math.max(0.3,+(z-0.25).toFixed(2))],["reset",()=>1],["+",z=>Math.min(6,+(z+0.25).toFixed(2))]].map(([l,fn])=>(
                <button key={l} onClick={()=>setZoom(fn)}
                  style={{background:T.bgBtn,border:`1px solid ${T.border}`,color:T.textDim,fontSize:12,padding:"4px 12px",cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}
                  onMouseEnter={e=>e.currentTarget.style.background=T.bgBtnHov}
                  onMouseLeave={e=>e.currentTarget.style.background=T.bgBtn}
                >{l}</button>
              ))}
              <span style={{fontSize:11,color:T.textDim,minWidth:42}}>{Math.round(zoom*100)}%</span>
              <div style={{width:1,height:20,background:T.border,margin:"0 4px"}}/>
              <button onClick={exportPNG} disabled={exporting}
                style={{background:T.bgBtn,border:`1px solid ${T.border}`,color:exporting?T.textFaint:T.textDim,fontSize:11,padding:"4px 12px",cursor:exporting?"wait":"pointer",borderRadius:4,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6,opacity:exporting?0.6:1}}
                onMouseEnter={e=>{if(!exporting)e.currentTarget.style.background=T.bgBtnHov;}}
                onMouseLeave={e=>e.currentTarget.style.background=T.bgBtn}
              >
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style={{flexShrink:0}}>
                  <path d="M5.5 1v6M2.5 5l3 3 3-3M1 9h9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
                {exporting?"exporting…":"export PNG"}
              </button>
            </div>
          </div>

          {/* ── Legend ── */}
          <div style={{display:"flex",gap:16,padding:"10px 24px",flexWrap:"wrap",alignItems:"center",borderBottom:`1px solid ${T.borderFaint}`}}>
            {GROUPS.map(g=>(
              <span key={g.t} style={{display:"flex",alignItems:"center",gap:7,fontSize:10.5,color:T.text}}>
                <span style={{width:14,height:5,background:g.color,display:"inline-block",borderRadius:2,
                  border:g.t==="s"?"1px dashed "+g.color:"none",opacity:g.t==="s"?0.8:1}} />
                {g.label.split("(")[0].trim()}
              </span>
            ))}
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{display:"flex",alignItems:"center",gap:6,fontSize:9.5,color:T.textFaint}}>
                <svg width={18} height={12} style={{flexShrink:0}}>
                  {[0,3,6,9,12,15].map((x,i)=><line key={i} x1={x} y1={i%2===0?0:12} x2={x+3} y2={i%2===0?12:0} stroke="#4040a0" strokeWidth={1.5}/>)}
                </svg>
                <span>scale break — left of zig-zag is <span style={{color:"#8080c0"}}>×{(S_EARLY/S_ULTRA).toFixed(0)} compressed</span> (High Republic era)</span>
              </span>
              <span style={{display:"flex",alignItems:"center",gap:6,fontSize:9.5,color:T.textFaint}}>
                <svg width={18} height={12} style={{flexShrink:0}}>
                  {[0,3,6,9,12,15].map((x,i)=><line key={i} x1={x} y1={i%2===0?0:12} x2={x+3} y2={i%2===0?12:0} stroke="#4040a0" strokeWidth={1.5}/>)}
                </svg>
                <span>scale break — left of zig-zag is <span style={{color:"#8080c0"}}>×{(S_MAIN/S_EARLY).toFixed(0)} compressed</span> (Old Republic era)</span>
              </span>
            </span>
          </div>

          {/* ── Chart + Panel ── */}
          <div style={{display:"flex"}}>
            <div ref={chartRef} style={{flex:1,minWidth:0,display:"flex",overflowX:"auto",cursor:isDragging?"grabbing":"grab"}}
              onMouseDown={onChartMouseDown} onMouseMove={onChartMouseMove}>

              {/* Sticky labels */}
              <div style={{width:LW,flexShrink:0,position:"sticky",left:0,zIndex:10,background:T.bg,borderRight:`1px solid ${T.border}`}}>
                <div style={{height:AH,background:T.bgSurface,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"flex-end",justifyContent:"space-between",paddingBottom:8,paddingLeft:12,paddingRight:8}}>
                  <span style={{fontSize:8,color:T.textFaint,letterSpacing:".2em"}}>TITLE</span>
                  <div style={{display:"flex",gap:4}}>
                    {[["▾","expand all",()=>setCollapsed(new Set())],["▸","collapse all",()=>setCollapsed(new Set(GROUPS.map(g=>g.t)))]].map(([icon,title,fn])=>(
                      <button key={title} title={title} onClick={fn}
                        style={{background:T.bgBtn,border:`1px solid ${T.borderFaint}`,color:T.textFaint,fontSize:9,padding:"2px 6px",cursor:"pointer",borderRadius:3,fontFamily:"inherit",lineHeight:1}}
                        onMouseEnter={e=>{e.currentTarget.style.background=T.bgBtnHov;e.currentTarget.style.color=T.textDim;}}
                        onMouseLeave={e=>{e.currentTarget.style.background=T.bgBtn;e.currentTarget.style.color=T.textFaint;}}
                      >{icon}</button>
                    ))}
                  </div>
                </div>
                {ROWS.map((row,i)=>(
                  <div key={i}
                    onClick={e=>{ if(dragMoved.current)return; row.kind==="H"?toggleCollapse(row.t):togglePin(row.n); }}
                    style={{height:RH,display:"flex",alignItems:"center",gap:5,
                      paddingLeft:row.kind==="H"?8:14,paddingRight:6,
                      background:row.kind==="H"?T.bgRowH:pinned===row.n?(isDark?"#181838":"#d8d8f8"):hov===row.n?(isDark?"#131330":"#e0e0f4"):"transparent",
                      borderBottom:`1px solid ${T.borderFaint}`,
                      borderLeft:pinned===row.n?"3px solid "+(TC[row.t]?.bar??"#fff"):row.kind==="H"?"3px solid "+row.C:"3px solid transparent",
                      color:row.kind==="H"?row.C:(pinned===row.n||hov===row.n)?(isDark?"#ffffff":"#0a0a2e"):row.t==="s"?"#c8a060bb":T.text,
                      fontSize:row.kind==="H"?9.5:11,fontWeight:row.kind==="H"?700:300,
                      fontStyle:row.t==="s"&&row.kind==="E"?"italic":"normal",
                      letterSpacing:row.kind==="H"?".12em":".02em",
                      whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                      transition:"color .1s, background .1s",cursor:"pointer"}}
                  >
                    {row.kind==="H"&&(
                      <span style={{fontSize:8,opacity:0.7,flexShrink:0,transition:"transform .15s",
                        display:"inline-block",transform:collapsed.has(row.t)?"rotate(-90deg)":"rotate(0deg)"}}>▾</span>
                    )}
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{row.kind==="H"?row.label:row.n}</span>
                    {row.kind==="E"&&userdata[row.n]?.done&&(
                      <span style={{fontSize:9,color:"#6dc87a",flexShrink:0,marginLeft:2}}>✓</span>
                    )}
                  </div>
                ))}
              </div>

              {/* SVG */}
              <svg ref={svgRef} width={CW} height={CH}
                style={{display:"block",flexShrink:0,cursor:isDragging?"grabbing":"crosshair"}}
                onMouseMove={onSvgMouseMove} onMouseLeave={onSvgMouseLeave} onClick={onSvgClick}
              >
                {ERAS.map((e,i)=><rect key={i} x={px(e.s)} y={0} width={px(e.e)-px(e.s)} height={CH} fill={e.bg}/>)}
                {ERAS.slice(1).map((e,i)=><line key={i} x1={px(e.s)} y1={0} x2={px(e.s)} y2={CH} stroke="#2a2a50" strokeWidth={1}/>)}
                {[BREAK2,BREAK].map((brk,bi)=>{
                  const bx=px(brk),pts=[];
                  for(let y=0;y<CH;y+=5)pts.push(`${bx+(y%10<5?2.5:-2.5)},${y}`);
                  return<polyline key={bi} points={pts.join(" ")} stroke="#383878" strokeWidth={2} fill="none"/>;
                })}
                {ERAS.map((e,i)=>(
                  <text key={i} x={(px(e.s)+px(e.e))/2} y={16} textAnchor="middle"
                    fill={e.color} fillOpacity={0.6} fontSize={8.5} fontFamily="DM Mono,monospace" letterSpacing=".13em"
                  >{e.name}</text>
                ))}
                {[[BREAK2,"×"+(S_EARLY/S_ULTRA).toFixed(0)+"× COMPRESSED"],[BREAK,"×"+(S_MAIN/S_EARLY).toFixed(0)+"× EXPANDED"]].map(([brk,lbl],bi)=>(
                  <text key={bi} x={px(brk)-5} y={AH/2+4} textAnchor="end" fill="#505090" fontSize={6}
                    fontFamily="DM Mono,monospace" transform={`rotate(-90,${px(brk)-5},${AH/2+4})`}
                  >{lbl}</text>
                ))}
                <line x1={0} y1={AH-1} x2={CW} y2={AH-1} stroke="#303050"/>
                {TICKS.map(({y,lo})=>{
                  const x=px(y),ty=lo?AH-11:AH-24;
                  return(<g key={y}>
                    <line x1={x} y1={AH-9} x2={x} y2={AH} stroke="#6060a0" strokeWidth={1.5}/>
                    <text x={x} y={ty} textAnchor="middle" fill={y===0?"#f0d030":"#9898d0"}
                      fontSize={y===0?9:8} fontWeight={y===0?"500":"300"} fontFamily="DM Mono,monospace"
                    >{yl(y)}</text>
                    <line x1={x} y1={AH} x2={x} y2={CH} stroke={y===0?"#585820":"#1e1e38"} strokeWidth={y===0?1.5:1}/>
                  </g>);
                })}
                <line x1={px(0)} y1={AH} x2={px(0)} y2={CH} stroke="#f5c03055" strokeWidth={1.5} strokeDasharray="2,7"/>

                {/* Connection lines (below bars) */}
                {connectionLines.map(({x1,y1,x2,y2,bulge,key})=>(
                  <g key={key} style={{pointerEvents:"none"}}>
                    <path d={`M ${x1},${y1} C ${bulge},${y1} ${bulge},${y2} ${x2},${y2}`}
                      stroke={isDark?"rgba(255,220,80,0.7)":"rgba(180,120,0,0.75)"} strokeWidth={2} strokeDasharray="5,4" fill="none"/>
                    <circle cx={x2} cy={y2} r={3.5} fill={isDark?"rgba(255,220,80,0.85)":"rgba(180,120,0,0.85)"}/>
                  </g>
                ))}

                {ROWS.map((row,i)=>{
                  const ry=AH+i*RH;
                  if(row.kind==="H")return<rect key={i} x={0} y={ry} width={CW} height={RH} fill="#0e0e24"/>;
                  const c=TC[row.t],isActive=(pinned??hov)===row.n,isScrub=displayYear!=null&&row.seg.some(([a,b])=>displayYear>=a&&displayYear<=b);
                  return(
                    <g key={i} onMouseEnter={()=>setHov(row.n)} onMouseLeave={()=>setHov(null)}
                      onClick={e=>{e.stopPropagation();if(!dragMoved.current)togglePin(row.n);}} style={{cursor:"pointer"}}>
                      <rect x={0} y={ry} width={CW} height={RH} fill={isActive?"#161640":isScrub?"#121228":i%2===0?"#0c0c1c":"#06060f"}/>
                      {row.seg.slice(1).map((s,si)=>(
                        <line key={si} x1={px(row.seg[si][1])} y1={ry+RH/2} x2={px(s[0])} y2={ry+RH/2}
                          stroke={c.dim} strokeWidth={1.5} strokeDasharray="3,4"/>
                      ))}
                      {row.seg.map((s,si)=>{
                        const bx=px(s[0]),bw=Math.max(5,px(s[1])-px(s[0])),bh=RH-10,by=ry+5,lbl=row.lbl?.[si];
                        return(<g key={si}>
                          <rect x={bx+1} y={by+2} width={bw} height={bh} rx={3} fill="#000" opacity={.4}/>
                          <rect x={bx} y={by} width={bw} height={bh} rx={3} fill={c.bar} opacity={isActive?0.98:isScrub?0.95:row.t==="s"?0.70:0.85}/>
                          {row.t==="s"&&<rect x={bx} y={by} width={bw} height={bh} rx={3} fill="none" stroke={c.bar} strokeWidth={1} strokeDasharray="4,3" opacity={0.6}/>}
                          <rect x={bx} y={by} width={bw} height={Math.min(5,bh*.3)} rx={3} fill="rgba(255,255,255,.25)" style={{pointerEvents:"none"}}/>
                          {lbl&&bw>24&&<text x={bx+bw/2} y={by+bh/2+3.5} textAnchor="middle" fill="rgba(0,0,0,.85)" fontSize={6.5} fontFamily="DM Mono,monospace" fontWeight="500" style={{pointerEvents:"none"}}>{lbl}</text>}
                        </g>);
                      })}
                    </g>
                  );
                })}
                <line x1={0} y1={CH-1} x2={CW} y2={CH-1} stroke={T.border}/>
                {displayScrubX!=null&&(
                  <g style={{pointerEvents:"none"}}>
                    <line x1={displayScrubX} y1={0} x2={displayScrubX} y2={CH} stroke={scrubLocked?"#f5c030":"#ffffff"} strokeWidth={scrubLocked?8:6} strokeOpacity={0.06}/>
                    <line x1={displayScrubX} y1={0} x2={displayScrubX} y2={CH} stroke={scrubLocked?"#f5c030":"#aaaadd"} strokeWidth={scrubLocked?1.5:1} strokeDasharray={scrubLocked?"none":"4,3"} strokeOpacity={scrubLocked?0.9:0.7}/>
                    {(()=>{
                      const lbl=yearLbl(displayYear),tw=lbl.length*6.2+14,lxC=Math.min(Math.max(displayScrubX-tw/2,2),CW-tw-2);
                      return(<>
                        <rect x={lxC} y={AH-27} width={tw} height={18} rx={4} fill={scrubLocked?"#302000":"#101020"} stroke={scrubLocked?"#f5c030":"#6060a0"} strokeWidth={1} opacity={0.95}/>
                        <text x={lxC+tw/2} y={AH-14} textAnchor="middle" fill={scrubLocked?"#f5d050":"#c0c0f0"} fontSize={8.5} fontFamily="DM Mono,monospace">{lbl}</text>
                      </>);
                    })()}
                    {scrubLocked&&<circle cx={displayScrubX} cy={AH+6} r={4} fill="#f5c030" opacity={0.9}/>}
                  </g>
                )}
              </svg>
            </div>

            {/* ── Side panel ── */}
            <div style={{width:panelMode?320:0,minWidth:panelMode?320:0,overflow:"hidden",transition:"width .2s ease, min-width .2s ease",background:T.bgPanel,borderLeft:panelMode?`1px solid ${T.borderPanel}`:"none",flexShrink:0,position:"sticky",top:0,alignSelf:"flex-start",maxHeight:"100vh",overflowY:"auto"}}>

              {/* Row detail */}
              {panelMode==="row"&&rowDetail&&(()=>{
                const d=rowDetail,era=panelEra,ti=TYPE_INFO[d.t];
                const ud = userdata[d.n]||{};
                const rating = ud.rating||0;
                return(
                  <div style={{padding:"20px 18px",minWidth:300}}>
                    {/* Badge */}
                    <div style={{display:"inline-flex",alignItems:"center",gap:7,background:ti.color+"18",border:"1px solid "+ti.color+"55",color:ti.color,fontSize:8,letterSpacing:".18em",fontWeight:500,padding:"3px 10px",borderRadius:3,marginBottom:14}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:ti.color}}/>
                      {ti.label.toUpperCase()}{d.t==="s"&&<span style={{marginLeft:4,opacity:.6}}>· LEGENDS REF.</span>}
                    </div>
                    {/* Title */}
                    <div style={{fontSize:16,fontWeight:400,color:isDark?"#ffffff":"#0a0a1e",lineHeight:1.4,marginBottom:4,fontStyle:d.t==="s"?"italic":"normal"}}>{d.n}</div>
                    {/* Release date */}
                    {d.release&&<div style={{fontSize:9.5,color:T.textDim,marginBottom:d.desc?10:16,letterSpacing:".05em"}}>Released: {d.release}</div>}
                    {/* Description */}
                    {d.desc&&<div style={{fontSize:11.5,color:isDark?"#a0a8c0":"#3a3a60",lineHeight:1.7,marginBottom:16,fontStyle:"normal"}}>{d.desc}</div>}

                    {/* Watched + Rating */}
                    <div style={{borderTop:`1px solid ${T.borderPanel}`,paddingTop:14,marginBottom:14}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:10}}>MY STATUS</div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:ud.done?"#6dc87a":T.textDim,userSelect:"none"}}
                          onClick={()=>setDone(d.n,!ud.done)}>
                          <span style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${ud.done?"#6dc87a":T.border}`,background:ud.done?"#6dc87a22":"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:10,color:"#6dc87a"}}>
                            {ud.done?"✓":""}
                          </span>
                          watched
                        </label>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {[0,1,2,3,4].map(i=>(
                          <span key={i}
                            style={{fontSize:18,cursor:"pointer",color:i<rating?"#f5c030":isDark?"#303050":"#aaaacc",transition:"color .1s"}}
                            onClick={()=>setRating(d.n, rating===i+1 ? 0 : i+1)}
                            onMouseEnter={e=>e.currentTarget.style.color="#f5c030"}
                            onMouseLeave={e=>e.currentTarget.style.color=i<rating?"#f5c030":isDark?"#303050":"#aaaacc"}
                          >★</span>
                        ))}
                        {rating>0&&<span style={{fontSize:10,color:T.textDim,marginLeft:2}}>{rating}/5</span>}
                      </div>
                    </div>

                    {/* Before / After */}
                    {(d.before||d.after)&&<div style={{borderTop:`1px solid ${T.borderPanel}`,paddingTop:14,marginBottom:14}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:8}}>WATCH ORDER</div>
                      {d.before&&<div style={{marginBottom:6}}>
                        <div style={{fontSize:8.5,color:T.textFaint,marginBottom:4}}>Watch first:</div>
                        {d.before.map(n=>(
                          <div key={n} onClick={()=>setPinned(n)} style={{fontSize:10,color:isDark?"#7799cc":"#445588",cursor:"pointer",marginBottom:3,paddingLeft:8,borderLeft:`2px solid ${T.borderPanel}`}}
                            onMouseEnter={e=>e.currentTarget.style.color=isDark?"#aabbee":"#2233aa"}
                            onMouseLeave={e=>e.currentTarget.style.color=isDark?"#7799cc":"#445588"}
                          >↑ {n}</div>
                        ))}
                      </div>}
                      {d.after&&<div>
                        <div style={{fontSize:8.5,color:T.textFaint,marginBottom:4}}>Watch next:</div>
                        {d.after.map(n=>(
                          <div key={n} onClick={()=>setPinned(n)} style={{fontSize:10,color:isDark?"#7799cc":"#445588",cursor:"pointer",marginBottom:3,paddingLeft:8,borderLeft:`2px solid ${T.borderPanel}`}}
                            onMouseEnter={e=>e.currentTarget.style.color=isDark?"#aabbee":"#2233aa"}
                            onMouseLeave={e=>e.currentTarget.style.color=isDark?"#7799cc":"#445588"}
                          >↓ {n}</div>
                        ))}
                      </div>}
                    </div>}

                    {/* Era */}
                    {era&&<div style={{marginBottom:14}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:5}}>ERA</div>
                      <span style={{fontSize:9.5,color:era.color,letterSpacing:".1em",background:era.color+"15",border:"1px solid "+era.color+"35",padding:"2px 9px",borderRadius:3}}>{era.name}</span>
                    </div>}
                    {/* Timeline segments */}
                    <div style={{marginBottom:d.seasons?16:0}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:8}}>TIMELINE</div>
                      {d.seg.map((s,i)=>(
                        <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                          <div style={{width:3,height:18,borderRadius:2,flexShrink:0,marginTop:1,background:ti.color,opacity:.8}}/>
                          <div>
                            <div style={{fontSize:12,color:isDark?"#d0d0f0":"#1a1a3e"}}>{sfmt(s)}</div>
                            {d.lbl?.[i]&&<div style={{fontSize:9.5,color:T.textFaint,marginTop:2}}>{d.lbl[i]}</div>}
                          </div>
                        </div>
                      ))}
                      {d.seg.length>1&&<div style={{fontSize:9,color:T.textFaint,fontStyle:"italic",marginTop:2}}>{d.seg.length} segments with time gaps</div>}
                    </div>
                    {/* Seasons */}
                    {d.seasons&&<div style={{borderTop:`1px solid ${T.borderPanel}`,paddingTop:14,marginBottom:16}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:10}}>SEASONS / ARCS</div>
                      {d.seasons.map((s,i)=>(
                        <div key={i} style={{display:"flex",gap:10,marginBottom:7,alignItems:"flex-start"}}>
                          <span style={{minWidth:32,fontSize:8.5,color:ti.color,fontWeight:500,flexShrink:0,paddingTop:1}}>{s.s}</span>
                          <div>
                            <div style={{fontSize:10,color:isDark?"#b0b0d8":"#3a3a5a",letterSpacing:".02em"}}>{s.y}</div>
                            {s.note&&<div style={{fontSize:9,color:T.textFaint,marginTop:2,lineHeight:1.5}}>{s.note}</div>}
                          </div>
                        </div>
                      ))}
                    </div>}
                    {/* Notes */}
                    {d.note&&<div style={{borderTop:`1px solid ${T.borderPanel}`,paddingTop:14,marginBottom:16}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:8}}>{d.t==="s"?"CANONICAL REFERENCES":"NOTES"}</div>
                      <div style={{fontSize:11,color:d.t==="s"?"#c8a06099":isDark?"#a0a0c8":"#4a4a78",lineHeight:1.7,fontStyle:"italic"}}>{d.note}</div>
                    </div>}
                    {/* Links */}
                    {d.links&&<div style={{borderTop:`1px solid ${T.borderPanel}`,paddingTop:14,marginBottom:16}}>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:8}}>SOURCES</div>
                      {d.links.map((lk,i)=>(
                        <a key={i} href={lk.u} target="_blank" rel="noopener noreferrer"
                          style={{display:"flex",alignItems:"center",gap:6,fontSize:10.5,color:"#4a72aa",marginBottom:6,textDecoration:"none"}}
                          onMouseEnter={e=>e.currentTarget.style.color="#7799dd"}
                          onMouseLeave={e=>e.currentTarget.style.color="#4a72aa"}
                        >
                          <span style={{fontSize:9}}>↗</span>{lk.l}
                        </a>
                      ))}
                    </div>}
                    {/* Close */}
                    <button onClick={()=>setPinned(null)} style={{width:"100%",background:T.bgBtn,border:`1px solid ${T.borderPanel}`,color:T.textFaint,fontSize:9,padding:"7px",cursor:"pointer",borderRadius:4,fontFamily:"inherit",letterSpacing:".12em"}}
                      onMouseEnter={e=>e.currentTarget.style.background=T.bgBtnHov}
                      onMouseLeave={e=>e.currentTarget.style.background=T.bgBtn}
                    >CLOSE ✕</button>
                  </div>
                );
              })()}

              {/* Scrubber panel */}
              {panelMode==="scrub"&&(
                <div style={{padding:"20px 18px",minWidth:300}}>
                  <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".16em",marginBottom:6}}>📍 LOCKED AT</div>
                  <div style={{fontSize:18,fontWeight:400,color:"#f5d050",marginBottom:16,letterSpacing:".05em"}}>{yearLbl(lockedYear)}</div>
                  {scrubItems.length===0
                    ?<div style={{fontSize:10,color:T.textFaint,fontStyle:"italic"}}>No media at this point</div>
                    :<>
                      <div style={{fontSize:7.5,color:T.textFaint,letterSpacing:".14em",marginBottom:10}}>
                        ACTIVE NOW · {scrubItems.length} title{scrubItems.length!==1?"s":""}
                      </div>
                      {scrubItems.map(d=>(
                        <div key={d.n} onClick={()=>setPinned(d.n)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",marginBottom:4,borderRadius:4,background:isDark?"#101022":"#e8e8f8",border:`1px solid ${T.border}`,cursor:"pointer"}}
                          onMouseEnter={e=>e.currentTarget.style.background=isDark?"#181832":"#dcdcf4"}
                          onMouseLeave={e=>e.currentTarget.style.background=isDark?"#101022":"#e8e8f8"}
                        >
                          <span style={{width:8,height:8,borderRadius:2,flexShrink:0,background:TYPE_INFO[d.t].color}}/>
                          <div>
                            <div style={{fontSize:10.5,color:isDark?"#e0e0f0":"#1a1a3e",fontStyle:d.t==="s"?"italic":"normal"}}>{d.n}</div>
                            <div style={{fontSize:8.5,color:TYPE_INFO[d.t].color,opacity:.7,marginTop:1}}>{TYPE_INFO[d.t].label}{d.t==="s"?" · soft canon":""}</div>
                          </div>
                        </div>
                      ))}
                      <div style={{fontSize:8.5,color:T.textFaint,marginTop:10,fontStyle:"italic"}}>click a title to pin its details</div>
                    </>
                  }
                  <button onClick={()=>{setScrubLocked(false);setLockedYear(null);}} style={{marginTop:16,width:"100%",background:T.bgBtn,border:`1px solid ${T.borderPanel}`,color:T.textFaint,fontSize:9,padding:"7px",cursor:"pointer",borderRadius:4,fontFamily:"inherit",letterSpacing:".12em"}}
                    onMouseEnter={e=>e.currentTarget.style.background=T.bgBtnHov}
                    onMouseLeave={e=>e.currentTarget.style.background=T.bgBtn}
                  >UNLOCK ✕</button>
                </div>
              )}
            </div>
          </div>

          {/* ── Footnote ── */}
          <div style={{padding:"10px 24px 12px",fontSize:9,color:T.textFaint,lineHeight:1.8,borderTop:`1px solid ${T.borderFaint}`}}>
            High Republic: 3 phases — Phase II (~382 BBY), Phase I (~232 BBY), Phase III (~132 BBY). &nbsp;
            Soft Canon: Legends media with confirmed references in Disney canon — not fully canonical but not ignored. &nbsp;
            <a href="https://github.com/Simmonsstummer/starwars-gantt" target="_blank" rel="noopener"
              style={{color:"#4444aa",textDecoration:"none"}}
              onMouseEnter={e=>e.currentTarget.style.color="#7777dd"}
              onMouseLeave={e=>e.currentTarget.style.color="#4444aa"}
            >github.com/Simmonsstummer/starwars-gantt</a>
          </div>

          {/* ── Disclaimer ── */}
          <div style={{padding:"10px 24px 24px",fontSize:8.5,color:T.textFaint,lineHeight:1.9,borderTop:`1px solid ${T.borderFaint}`}}>
            <span style={{color:T.textDim,fontWeight:500,letterSpacing:".1em"}}>DISCLAIMER</span>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
